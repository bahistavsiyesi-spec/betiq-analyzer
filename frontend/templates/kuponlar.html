<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetIQ — Kuponlarım</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background:#0a0a14; color:#fff; font-family:'Syne',sans-serif; min-height:100vh; margin:0; }
        .page-header { padding:24px 20px 0; display:flex; align-items:center; gap:16px; max-width:640px; margin:0 auto; }
        .back-btn { color:#7c3aed; text-decoration:none; font-size:13px; font-weight:600; }
        .page-header h1 { font-size:20px; font-weight:800; margin:0; }
        .summary-bar { display:flex; gap:12px; padding:16px 20px; max-width:640px; margin:0 auto; }
        .summary-box { flex:1; background:#12121f; border:1px solid #1e1e3a; border-radius:12px; padding:12px; text-align:center; }
        .summary-box .val { font-size:22px; font-weight:800; }
        .summary-box .lbl { font-size:10px; color:#555; margin-top:2px; }
        .val-won { color:#22c55e; }
        .val-lost { color:#ef4444; }
        .val-pending { color:#f59e0b; }
        .coupons-list { padding:0 20px 40px; display:flex; flex-direction:column; gap:16px; max-width:640px; margin:0 auto; }
        .coupon-card { background:#12121f; border:1px solid #1e1e3a; border-radius:16px; overflow:hidden; }
        .coupon-card.won { border-color:#22c55e55; }
        .coupon-card.lost { border-color:#ef444455; }
        .coupon-header { padding:14px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e1e3a; gap:8px; }
        .coupon-date { font-size:13px; color:#888; font-weight:600; }
        .coupon-status { font-size:11px; font-weight:800; padding:4px 12px; border-radius:20px; }
        .status-won { background:#22c55e22; color:#22c55e; }
        .status-lost { background:#ef444422; color:#ef4444; }
        .status-pending { background:#f59e0b22; color:#f59e0b; }
        .coupon-items { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
        .coupon-item { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:#0d0d1a; border-radius:10px; border:1px solid #1e1e3a; }
        .coupon-item.item-won { border-color:#22c55e44; background:#22c55e08; }
        .coupon-item.item-lost { border-color:#ef444444; background:#ef444408; }
        .item-left { display:flex; flex-direction:column; gap:2px; }
        .item-teams { font-size:12px; font-weight:700; color:#fff; }
        .item-league { font-size:10px; color:#444; }
        .item-right { display:flex; align-items:center; gap:8px; }
        .item-pred { font-size:11px; font-weight:700; color:#a78bfa; background:#2a1a4e; padding:3px 8px; border-radius:6px; white-space:nowrap; }
        .item-result { font-size:11px; font-weight:800; padding:4px 10px; border-radius:20px; white-space:nowrap; }
        .item-result.tuttu { background:#22c55e22; color:#22c55e; border:1px solid #22c55e44; }
        .item-result.tutmadi { background:#ef444422; color:#ef4444; border:1px solid #ef444444; }
        .item-result.bekliyor { background:#f59e0b22; color:#f59e0b; border:1px solid #f59e0b44; }
        .coupon-footer { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #1e1e3a; gap:8px; }
        .coupon-score { font-size:12px; color:#555; }
        .download-btn { padding:8px 16px; border-radius:8px; border:none; background:#7c3aed; color:#fff; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
        .download-btn:hover { background:#6d28d9; }
        .delete-btn { padding:8px 12px; border-radius:8px; border:1px solid #ef444444; background:transparent; color:#ef4444; font-size:12px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
        .delete-btn:hover { background:#ef444422; }
        .no-coupons { text-align:center; padding:60px 20px; color:#444; font-size:14px; }
        .no-coupons a { color:#7c3aed; text-decoration:none; font-weight:600; }
        .refresh-bar { padding:0 20px 12px; max-width:640px; margin:0 auto; display:flex; gap:8px; align-items:center; }
        .refresh-btn { padding:8px 16px; border-radius:8px; border:none; background:#1e1e3a; color:#a78bfa; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
        .refresh-btn:hover { background:#2a1a4e; }

        /* ── Kupon İstatistikleri ─────────────────────────────────────── */
        .stats-section { padding:0 20px 8px; max-width:640px; margin:0 auto; }
        .stats-section-title { font-size:11px; font-weight:700; color:#555; letter-spacing:0.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
        .stats-section-title::after { content:''; flex:1; height:1px; background:#1e1e3a; }
        .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:8px; margin-bottom:12px; }
        .stat-box { background:#12121f; border:1px solid #1e1e3a; border-radius:12px; padding:12px; text-align:center; }
        .stat-box .sv { font-size:20px; font-weight:800; }
        .stat-box .sl { font-size:10px; color:#555; margin-top:2px; }
        .sv-green { color:#22c55e; }
        .sv-red { color:#ef4444; }
        .sv-purple { color:#a78bfa; }
        .sv-yellow { color:#f59e0b; }
        .sv-blue { color:#3b82f6; }
        .monthly-table { width:100%; border-collapse:collapse; margin-bottom:12px; }
        .monthly-table th { font-size:10px; color:#444; text-align:left; padding:6px 8px; border-bottom:1px solid #1a1a2e; }
        .monthly-table td { font-size:12px; padding:8px 8px; border-bottom:1px solid #111; }
        .monthly-table tr:last-child td { border-bottom:none; }
        .roi-pos { color:#22c55e; font-weight:700; }
        .roi-neg { color:#ef4444; font-weight:700; }
        .roi-null { color:#555; }
        .type-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; margin-bottom:12px; }
        .type-card { background:#12121f; border:1px solid #1e1e3a; border-radius:10px; padding:10px 12px; }
        .type-card .tc-label { font-size:11px; color:#a78bfa; font-weight:700; margin-bottom:6px; }
        .type-card .tc-rate { font-size:18px; font-weight:800; }
        .type-card .tc-meta { font-size:10px; color:#555; margin-top:2px; }
        .streak-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:700; }
        .streak-win { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#22c55e; }
        .streak-loss { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444; }
        .streak-none { background:#12121f; border:1px solid #1e1e3a; color:#555; }
        .stats-toggle { font-size:12px; color:#a78bfa; cursor:pointer; background:none; border:none; font-family:inherit; font-weight:600; padding:4px 0; margin-bottom:8px; }
        .stats-body { display:none; }
        .stats-body.open { display:block; }
    </style>
</head>
<body>
    <div class="page-header">
        <a href="/" class="back-btn">← Ana Sayfa</a>
        <h1>🎫 Kuponlarım</h1>
    </div>
    <div class="summary-bar" id="summaryBar"></div>

    <!-- Kupon İstatistikleri -->
    <div class="stats-section" id="couponStatsSection" style="display:none;">
        <div class="stats-section-title">📊 KUPON İSTATİSTİKLERİ
            <button class="stats-toggle" onclick="toggleStats()" id="statsToggle">▼ Göster</button>
        </div>
        <div class="stats-body" id="statsBody"></div>
    </div>

    <div class="refresh-bar">
        <button class="refresh-btn" onclick="refreshResults()" id="refreshBtn">🔄 Sonuçları Güncelle</button>
        <span id="refreshMsg" style="font-size:12px;color:#555;"></span>
    </div>
    <div class="coupons-list" id="couponsList">
        <div style="text-align:center;padding:40px;color:#444">Yükleniyor...</div>
    </div>

    <script>
    async function loadCoupons() {
        try {
            const resp = await fetch('/api/coupon/list');
            const coupons = await resp.json();
            const won = coupons.filter(c => c.won === 1).length;
            const lost = coupons.filter(c => c.status === 'completed' && c.won === 0).length;
            const pending = coupons.filter(c => c.status === 'pending').length;
            document.getElementById('summaryBar').innerHTML = `
                <div class="summary-box"><div class="val val-won">${won}</div><div class="lbl">Kazandi</div></div>
                <div class="summary-box"><div class="val val-lost">${lost}</div><div class="lbl">Kaybetti</div></div>
                <div class="summary-box"><div class="val val-pending">${pending}</div><div class="lbl">Bekliyor</div></div>`;
            if (!coupons.length) {
                document.getElementById('couponsList').innerHTML = `
                    <div class="no-coupons">Henuz kaydedilmis kupon yok.<br><br>
                    <a href="/">Ana sayfadan kupon olustur</a></div>`;
                return;
            }
            document.getElementById('couponsList').innerHTML = coupons.map(c => buildCouponCard(c)).join('');
        } catch(e) {
            document.getElementById('couponsList').innerHTML = `<div class="no-coupons">Yukleme hatasi: ${e.message}</div>`;
        }
    }

    async function refreshResults() {
        const btn = document.getElementById('refreshBtn');
        const msg = document.getElementById('refreshMsg');
        btn.disabled = true; btn.textContent = 'Guncelleniyor...';
        try {
            const today = new Date().toISOString().split('T')[0];
            const resp = await fetch(`/api/coupon/update/${today}`, { method: 'POST' });
            const data = await resp.json();
            if (data.status === 'success') {
                msg.textContent = 'Guncellendi!'; msg.style.color = '#22c55e';
                await loadCoupons();
            } else {
                msg.textContent = 'Hata!'; msg.style.color = '#ef4444';
            }
        } catch(e) {
            msg.textContent = e.message; msg.style.color = '#ef4444';
        }
        btn.disabled = false; btn.textContent = 'Sonuclari Guncelle';
        setTimeout(() => { msg.textContent = ''; }, 3000);
    }

    function buildCouponCard(c) {
        const isWon = c.won === 1;
        const isCompleted = c.status === 'completed';
        const cardClass = isWon ? 'won' : isCompleted ? 'lost' : '';
        const statusHtml = isWon
            ? '<span class="coupon-status status-won">KAZANDI</span>'
            : isCompleted
            ? '<span class="coupon-status status-lost">KAYBETTI</span>'
            : '<span class="coupon-status status-pending">Bekliyor</span>';
        const items = (c.items || []).map(item => {
            const res = item.result;
            const itemClass = res === true ? 'item-won' : res === false ? 'item-lost' : '';
            const resClass = res === true ? 'tuttu' : res === false ? 'tutmadi' : 'bekliyor';
            const resLabel = res === true ? '✓ Tuttu' : res === false ? '✗ Tutmadı' : '⏳ Bekliyor';
            return `<div class="coupon-item ${itemClass}">
                <div class="item-left">
                    <div class="item-teams">${item.home_team} vs ${item.away_team}</div>
                    <div class="item-league">${item.league || ''}</div>
                </div>
                <div class="item-right">
                    <span class="item-pred">${item.prediction_label}</span>
                    <span class="item-result ${resClass}">${resLabel}</span>
                </div>
            </div>`;
        }).join('');
        const scoreText = isCompleted || c.correct_items > 0
            ? `${c.correct_items}/${c.total_items} tahmin tuttu`
            : `${c.total_items} tahmin`;
        const typeMap = { taraf: '🎯 Taraf', ust: '⚽ 2.5 Üst', iy: '⏱️ İY Gol', ust_kg: '💎 Üst + KG Var' };
        const typeLabel = typeMap[c.coupon_type] || '🎯 Taraf';
        return `<div class="coupon-card ${cardClass}" id="coupon-${c.id}">
            <div class="coupon-header">
                <div style="display:flex;flex-direction:column;gap:3px;">
                    <span class="coupon-date">${c.coupon_date}</span>
                    <span style="font-size:11px;color:#a78bfa;font-weight:700;">${typeLabel}</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    ${statusHtml}
                    <button class="delete-btn" onclick="deleteCoupon(${c.id})">Sil</button>
                </div>
            </div>
            <div class="coupon-items">${items}</div>
            <div class="coupon-footer">
                <span class="coupon-score">${scoreText}</span>
                <button class="download-btn" onclick="downloadCouponCard(${c.id}, '${c.coupon_date}')">PNG Indir</button>
            </div>
        </div>`;
    }

    async function deleteCoupon(id) {
        if (!confirm('Bu kuponu silmek istediğine emin misin?')) return;
        try {
            const resp = await fetch(`/api/coupon/delete/${id}`, { method: 'DELETE' });
            const data = await resp.json();
            if (data.status === 'success') { document.getElementById(`coupon-${id}`)?.remove(); loadCoupons(); }
            else { alert('Silme hatasi: ' + data.message); }
        } catch(e) { alert('Hata: ' + e.message); }
    }

    async function downloadCouponCard(id, date) {
        const card = document.getElementById(`coupon-${id}`);
        if (!card) return;
        const btn = card.querySelector('.download-btn');
        if (btn) { btn.textContent = '...'; btn.disabled = true; }
        try {
            const canvas = await html2canvas(card, { scale: 3, backgroundColor: '#12121f', useCORS: true, logging: false });
            const link = document.createElement('a');
            link.download = `betiq_kupon_${date}.png`;
            link.href = canvas.toDataURL('image/png'); link.click();
        } catch(e) { alert('Hata: ' + e.message); }
        if (btn) { btn.textContent = 'PNG Indir'; btn.disabled = false; }
    }

    loadCoupons();
    loadCouponStats();

    function toggleStats() {
        const body = document.getElementById('statsBody');
        const btn = document.getElementById('statsToggle');
        body.classList.toggle('open');
        btn.textContent = body.classList.contains('open') ? '▲ Gizle' : '▼ Göster';
    }

    async function loadCouponStats() {
        try {
            const resp = await fetch('/api/coupon/stats');
            const d = await resp.json();
            if (d.error || d.completed === 0) return;
            document.getElementById('couponStatsSection').style.display = '';

            const roiColor = d.roi === null ? 'roi-null' : d.roi >= 0 ? 'roi-pos' : 'roi-neg';
            const roiText = d.roi === null ? 'N/A' : (d.roi >= 0 ? '+' : '') + d.roi + '%';
            const winRateColor = d.win_rate >= 55 ? 'sv-green' : d.win_rate >= 40 ? 'sv-yellow' : 'sv-red';

            // Mevcut seri badge
            let streakHtml = '';
            if (d.cur_streak && d.cur_streak_type) {
                const cls = d.cur_streak_type === 'win' ? 'streak-win' : 'streak-loss';
                const icon = d.cur_streak_type === 'win' ? '🔥' : '❄️';
                streakHtml = `<span class="streak-badge ${cls}">${icon} Mevcut ${d.cur_streak_type === 'win' ? 'Kazanma' : 'Kaybetme'} Serisi: ${d.cur_streak}</span>`;
            } else {
                streakHtml = `<span class="streak-badge streak-none">— Seri yok</span>`;
            }

            // Tip bazlı başarı
            const typeHtml = (d.by_type || []).map(t => {
                const tc = t.win_rate >= 55 ? 'sv-green' : t.win_rate >= 40 ? 'sv-yellow' : 'sv-red';
                return `<div class="type-card">
                    <div class="tc-label">${t.label}</div>
                    <div class="tc-rate ${tc}">%${t.win_rate}</div>
                    <div class="tc-meta">${t.won}/${t.total} kazandı</div>
                </div>`;
            }).join('');

            // Aylık tablo
            const monthlyHtml = (d.monthly || []).length ? `
                <table class="monthly-table">
                    <thead><tr><th>Ay</th><th>Kazandı/Kaybetti</th><th>Oran</th><th>ROI</th></tr></thead>
                    <tbody>${(d.monthly || []).map(m => {
                        const rc = m.roi === null ? 'roi-null' : m.roi >= 0 ? 'roi-pos' : 'roi-neg';
                        const rt = m.roi === null ? '—' : (m.roi >= 0 ? '+' : '') + m.roi + '%';
                        const [y, mo] = m.month.split('-');
                        const label = new Date(y, mo-1).toLocaleDateString('tr-TR', {month:'long', year:'numeric'});
                        return `<tr>
                            <td style="color:#aaa;">${label}</td>
                            <td style="color:#888;">${m.won}K / ${m.lost}K</td>
                            <td style="color:${m.win_rate>=55?'#22c55e':m.win_rate>=40?'#f59e0b':'#ef4444'};font-weight:700;">%${m.win_rate}</td>
                            <td class="${rc}">${rt}</td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>` : '';

            document.getElementById('statsBody').innerHTML = `
                <div class="stats-row">
                    <div class="stat-box"><div class="sv sv-purple">${d.completed}</div><div class="sl">Tamamlanan</div></div>
                    <div class="stat-box"><div class="sv ${winRateColor}">%${d.win_rate}</div><div class="sl">Kazanma Oranı</div></div>
                    <div class="stat-box"><div class="sv ${roiColor}">${roiText}</div><div class="sl">Toplam ROI</div></div>
                    <div class="stat-box"><div class="sv sv-green">${d.max_win_streak}</div><div class="sl">Max Kazanma Serisi</div></div>
                    <div class="stat-box"><div class="sv sv-red">${d.max_loss_streak}</div><div class="sl">Max Kaybetme Serisi</div></div>
                </div>
                <div style="margin-bottom:10px;">${streakHtml}</div>
                ${typeHtml ? `<div style="font-size:10px;color:#444;margin-bottom:6px;font-weight:700;">TİP BAZLI BAŞARI</div><div class="type-grid">${typeHtml}</div>` : ''}
                ${monthlyHtml ? `<div style="font-size:10px;color:#444;margin-bottom:6px;font-weight:700;">AYLIK PERFORMANS</div>${monthlyHtml}` : ''}
            `;
        } catch(e) {
            console.error('Kupon stats yüklenemedi:', e);
        }
    }
    </script>
</body>
</html>
