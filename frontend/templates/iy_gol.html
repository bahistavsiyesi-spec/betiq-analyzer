<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetIQ — İY Gol Olur</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background:#080810; color:#ccc; font-family:'Syne',sans-serif; min-height:100vh; margin:0; }

        .page-header { padding:20px 20px 0; display:flex; align-items:center; gap:16px; max-width:700px; margin:0 auto; }
        .back-btn { color:#a78bfa; text-decoration:none; font-size:13px; font-weight:600; }
        .back-btn:hover { color:#fff; }
        .page-title { font-size:20px; font-weight:800; color:#fff; margin:0; }

        /* Stats bar */
        .stats-bar { display:flex; gap:12px; padding:16px 20px; max-width:700px; margin:0 auto; flex-wrap:wrap; }
        .stat-box { flex:1; min-width:130px; background:#0d0d1a; border:1px solid #1e1e3a; border-radius:12px; padding:14px; text-align:center; }
        .stat-val { font-size:22px; font-weight:800; color:#a78bfa; }
        .stat-val.green { color:#22c55e; }
        .stat-val.yellow { color:#f59e0b; }
        .stat-val.red { color:#ef4444; }
        .stat-lbl { font-size:10px; color:#555; margin-top:3px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
        .stat-sub { font-size:11px; color:#666; margin-top:2px; }

        /* Controls */
        .controls { padding:0 20px 12px; max-width:700px; margin:0 auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .date-nav { display:flex; align-items:center; gap:6px; }
        .nav-btn { padding:7px 12px; border-radius:8px; border:1px solid #2a1a4e; background:transparent; color:#a78bfa; font-size:13px; cursor:pointer; font-family:inherit; transition:all .2s; }
        .nav-btn:hover { background:#2a1a4e; color:#fff; }
        .date-display { font-size:13px; font-weight:700; color:#fff; min-width:100px; text-align:center; }
        input[type="date"] { padding:7px 10px; border-radius:8px; border:1px solid #2a1a4e; background:#0d0d1a; color:#a78bfa; font-size:12px; font-family:inherit; cursor:pointer; }
        input[type="date"]:focus { outline:none; border-color:#7c3aed; }

        .scan-btn { padding:9px 20px; border-radius:9px; border:none; background:#7c3aed; color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; margin-left:auto; }
        .scan-btn:hover { background:#6d28d9; }
        .scan-btn:disabled { opacity:.5; cursor:not-allowed; }

        /* Match list */
        .matches-wrap { padding:0 20px 40px; max-width:700px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }

        .match-card { background:#0d0d1a; border:1px solid #1e1e3a; border-radius:14px; overflow:hidden; transition:border-color .2s; }
        .match-card.result-iy    { border-color:#22c55e55; }
        .match-card.result-saved { border-color:#f59e0b55; }
        .match-card.result-none  { border-color:#ef444455; }

        .card-top { padding:14px 16px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
        .card-teams { font-size:14px; font-weight:800; color:#fff; }
        .card-meta { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
        .card-league { font-size:11px; color:#555; font-weight:600; }
        .card-time { font-size:11px; color:#a78bfa; font-weight:700; }

        .card-pcts { display:flex; gap:10px; padding:10px 16px; border-top:1px solid #13131f; flex-wrap:wrap; }
        .pct-pill { display:flex; align-items:center; gap:6px; background:#12122a; border:1px solid #1e1e3a; border-radius:20px; padding:5px 12px; font-size:11px; font-weight:700; }
        .pct-pill .pill-lbl { color:#666; }
        .pct-pill .pill-val { color:#22c55e; }
        .pct-pill .pill-val.warn { color:#f59e0b; }

        /* Result display (after save) */
        .result-display { display:flex; gap:10px; padding:10px 16px; border-top:1px solid #13131f; flex-wrap:wrap; align-items:center; }
        .result-badge { font-size:12px; font-weight:700; padding:5px 12px; border-radius:20px; }
        .result-badge.iy-ok   { background:#22c55e22; color:#22c55e; border:1px solid #22c55e44; }
        .result-badge.iy-fail { background:#ef444422; color:#ef4444; border:1px solid #ef444444; }
        .result-badge.iy2-ok  { background:#22c55e22; color:#22c55e; border:1px solid #22c55e44; }
        .result-badge.iy2-fail{ background:#ef444422; color:#ef4444; border:1px solid #ef444444; }
        .result-scores { font-size:11px; color:#555; font-family:'JetBrains Mono', monospace; }
        .result-edit-btn { margin-left:auto; padding:4px 10px; border-radius:7px; border:1px solid #2a1a4e; background:transparent; color:#666; font-size:10px; cursor:pointer; font-family:inherit; }
        .result-edit-btn:hover { color:#a78bfa; border-color:#a78bfa; }

        /* Score entry */
        .card-entry { display:flex; gap:8px; padding:10px 16px; border-top:1px solid #13131f; align-items:center; flex-wrap:wrap; }
        .entry-group { display:flex; flex-direction:column; gap:3px; }
        .entry-lbl { font-size:10px; color:#555; font-weight:600; }
        .score-input { width:70px; padding:6px 10px; border-radius:8px; border:1px solid #2a1a4e; background:#080810; color:#fff; font-size:13px; font-family:'JetBrains Mono', monospace; font-weight:700; text-align:center; }
        .score-input:focus { outline:none; border-color:#7c3aed; }
        .score-input::placeholder { color:#333; }
        .save-btn { padding:7px 16px; border-radius:8px; border:none; background:#7c3aed; color:#fff; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; align-self:flex-end; }
        .save-btn:hover { background:#6d28d9; }
        .save-btn:disabled { opacity:.5; cursor:not-allowed; }

        /* Telegram */
        .card-actions { display:flex; gap:8px; padding:10px 16px; border-top:1px solid #13131f; }
        .tg-btn { padding:7px 14px; border-radius:8px; border:1px solid #2a6e9e; background:transparent; color:#38bdf8; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
        .tg-btn:hover { background:#1e4a6e; }
        .tg-btn.sent { border-color:#22c55e55; color:#22c55e; }

        .empty-state { text-align:center; padding:60px 20px; color:#444; }
        .empty-state p { font-size:14px; }
        .empty-state small { font-size:11px; color:#333; }

        .toast { position:fixed; bottom:24px; right:24px; background:#22c55e; color:#fff; padding:10px 20px; border-radius:10px; font-size:13px; font-weight:700; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; }
        .toast.err { background:#ef4444; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
    <div class="page-header">
        <a href="/" class="back-btn">← Ana Sayfa</a>
        <h1 class="page-title">⏱️ İY Gol Olur</h1>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-box">
            <div class="stat-val green" id="statIyVal">—</div>
            <div class="stat-lbl">İY Tuttu</div>
            <div class="stat-sub" id="statIySub">— / —</div>
        </div>
        <div class="stat-box">
            <div class="stat-val yellow" id="statSavedVal">—</div>
            <div class="stat-lbl">Maç Kurtarıldı</div>
            <div class="stat-sub" id="statSavedSub">— / —</div>
        </div>
        <div class="stat-box">
            <div class="stat-val red" id="statNoneVal">—</div>
            <div class="stat-lbl">İkisi de Tutmadı</div>
            <div class="stat-sub" id="statNoneSub">— / —</div>
        </div>
    </div>

    <div class="controls">
        <div class="date-nav">
            <button class="nav-btn" id="prevDay">←</button>
            <span class="date-display" id="dateDisplay"></span>
            <button class="nav-btn" id="nextDay">→</button>
        </div>
        <input type="date" id="datePicker">
        <button class="scan-btn" id="scanBtn">🔍 Tara</button>
    </div>

    <div class="matches-wrap" id="matchesList">
        <div class="empty-state">
            <p>Maç bulunamadı</p>
            <small>CSV yükleyip "Tara" butonuna basın</small>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const today = new Date().toISOString().slice(0, 10);
    let currentDate = today;

    const dateDisplay = document.getElementById('dateDisplay');
    const datePicker  = document.getElementById('datePicker');
    const matchesList = document.getElementById('matchesList');

    function fmtDate(d) {
        const [y, m, day] = d.split('-');
        return `${day}.${m}.${y}`;
    }

    function fmtTime(raw) {
        if (!raw) return '—';
        // ISO string: "2026-04-08T10:00:00.000Z" → "10:00" (TR saat +3)
        try {
            const dt = new Date(raw);
            if (!isNaN(dt)) {
                return dt.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul' });
            }
        } catch(e) {}
        // HH:MM zaten varsa olduğu gibi döndür
        const m = raw.match(/(\d{2}:\d{2})/);
        return m ? m[1] : raw;
    }

    function setDate(d) {
        currentDate = d;
        dateDisplay.textContent = fmtDate(d);
        datePicker.value = d;
        loadMatches(d);
        loadStats(d);
    }

    document.getElementById('prevDay').onclick = () => {
        const d = new Date(currentDate);
        d.setDate(d.getDate() - 1);
        setDate(d.toISOString().slice(0, 10));
    };
    document.getElementById('nextDay').onclick = () => {
        const d = new Date(currentDate);
        d.setDate(d.getDate() + 1);
        setDate(d.toISOString().slice(0, 10));
    };
    datePicker.onchange = () => setDate(datePicker.value);

    async function loadStats(date) {
        try {
            const r = await fetch(`/api/iy-gol/stats?date=${date}`);
            const s = await r.json();
            const total = s.total_resolved || 0;

            document.getElementById('statIyVal').textContent    = total ? `%${s.iy_pct}`    : '—';
            document.getElementById('statSavedVal').textContent = total ? `%${s.saved_pct}`  : '—';
            document.getElementById('statNoneVal').textContent  = total ? `%${s.none_pct}`   : '—';

            document.getElementById('statIySub').textContent    = `${s.iy_correct} / ${total}`;
            document.getElementById('statSavedSub').textContent = `${s.saved} / ${total}`;
            document.getElementById('statNoneSub').textContent  = `${s.none} / ${total}`;
        } catch(e) {}
    }

    async function loadMatches(date) {
        matchesList.innerHTML = '<div class="empty-state"><p>Yükleniyor…</p></div>';
        try {
            const r = await fetch(`/api/iy-gol/matches/${date}`);
            const matches = await r.json();
            renderMatches(matches);
        } catch(e) {
            matchesList.innerHTML = '<div class="empty-state"><p>Hata oluştu</p></div>';
        }
    }

    function renderMatches(matches) {
        if (!matches || matches.length === 0) {
            matchesList.innerHTML = `<div class="empty-state">
                <p>Bu tarihte maç yok</p>
                <small>CSV yükleyip "Tara" butonuna basın</small>
            </div>`;
            return;
        }
        matchesList.innerHTML = matches.map(m => cardHTML(m)).join('');
        // Event listeners
        matchesList.querySelectorAll('.tg-btn').forEach(btn => btn.onclick = () => sendTelegram(btn));
        matchesList.querySelectorAll('.save-btn').forEach(btn => btn.onclick = () => saveResult(btn));
        matchesList.querySelectorAll('.result-edit-btn').forEach(btn => btn.onclick = () => editResult(btn));
    }

    function cardResultClass(m) {
        if (m.iy_result === null || m.iy_result === undefined) return '';
        if (m.iy_result === 1) return 'result-iy';
        if (m.iy_result === 0 && m.iy2_result === 1) return 'result-saved';
        return 'result-none';
    }

    function resultDisplayHTML(m) {
        if (m.iy_result === null || m.iy_result === undefined) return '';

        const iyBadge  = m.iy_result  === 1
            ? `<span class="result-badge iy-ok">✅ İY Gol</span>`
            : `<span class="result-badge iy-fail">❌ İY Gol Yok</span>`;

        let iy2Badge = '';
        if (m.iy2_result !== null && m.iy2_result !== undefined) {
            iy2Badge = m.iy2_result === 1
                ? `<span class="result-badge iy2-ok">✅ 2Y 1.5Ü</span>`
                : `<span class="result-badge iy2-fail">❌ 2Y 1.5Ü</span>`;
        }

        const scores = (m.iy_score || m.ft_score)
            ? `<span class="result-scores">İY: ${m.iy_score || '?'} — Maç: ${m.ft_score || '?'}</span>`
            : '';

        return `<div class="result-display" data-section="result-display">
            ${iyBadge}${iy2Badge}${scores}
            <button class="result-edit-btn" data-id="${m.id}">✏️ Düzenle</button>
        </div>`;
    }

    function entryHTML(m) {
        const hasResult = m.iy_result !== null && m.iy_result !== undefined;
        const hidden = hasResult ? ' style="display:none"' : '';
        return `<div class="card-entry" data-section="card-entry"${hidden}>
            <div class="entry-group">
                <span class="entry-lbl">İY Skoru</span>
                <input class="score-input" data-field="iy_score" placeholder="1-0" value="${m.iy_score || ''}">
            </div>
            <div class="entry-group">
                <span class="entry-lbl">Maç Sonu</span>
                <input class="score-input" data-field="ft_score" placeholder="2-1" value="${m.ft_score || ''}">
            </div>
            <button class="save-btn" data-id="${m.id}">Kaydet</button>
        </div>`;
    }

    function cardHTML(m) {
        const iy2Class = m.iy2_pct >= 65 ? '' : 'warn';
        const resClass = cardResultClass(m);

        return `
        <div class="match-card ${resClass}" data-id="${m.id}" data-home="${esc(m.home_team)}" data-away="${esc(m.away_team)}" data-league="${esc(m.league)}" data-time="${esc(m.match_time)}">
            <div class="card-top">
                <div class="card-teams">${esc(m.home_team)} vs ${esc(m.away_team)}</div>
                <div class="card-meta">
                    <span class="card-league">${esc(m.league)}</span>
                    <span class="card-time">${fmtTime(m.match_time)}</span>
                </div>
            </div>
            <div class="card-pcts">
                <div class="pct-pill">
                    <span class="pill-lbl">İY Gol</span>
                    <span class="pill-val">%${m.iy_pct}</span>
                </div>
                <div class="pct-pill">
                    <span class="pill-lbl">2Y 1.5Ü</span>
                    <span class="pill-val ${iy2Class}">%${m.iy2_pct}</span>
                </div>
            </div>
            ${resultDisplayHTML(m)}
            ${entryHTML(m)}
            <div class="card-actions">
                <button class="tg-btn" data-id="${m.id}">📨 Telegram</button>
            </div>
        </div>`;
    }

    function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function parseScore(str) {
        // "1-0", "1:0", "1 0" gibi formatları yakala
        const m = String(str || '').match(/(\d+)\s*[-:]\s*(\d+)/);
        if (!m) return null;
        return { h: parseInt(m[1]), a: parseInt(m[2]) };
    }

    async function saveResult(btn) {
        const card = btn.closest('.match-card');
        const id   = parseInt(card.dataset.id);
        const iyInput = card.querySelector('[data-field="iy_score"]');
        const ftInput = card.querySelector('[data-field="ft_score"]');

        const iyScore = parseScore(iyInput.value);
        const ftScore = parseScore(ftInput.value);

        if (!iyScore || !ftScore) {
            showToast('Geçerli skor girin (örn: 1-0)', true);
            return;
        }

        // İY gol hesabı
        const iyGoals  = iyScore.h + iyScore.a;
        const iy_result = iyGoals > 0 ? 1 : 0;

        // 2Y gol hesabı: maç sonu - İY
        const iy2Goals = (ftScore.h - iyScore.h) + (ftScore.a - iyScore.a);
        const iy2_result = iy2Goals > 1 ? 1 : 0;

        btn.disabled = true;
        btn.textContent = '⏳';
        try {
            const r = await fetch('/api/iy-gol/result', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id, iy_result, iy2_result,
                    iy_score: iyInput.value.trim(),
                    ft_score: ftInput.value.trim(),
                })
            });
            const d = await r.json();
            if (d.status === 'success') {
                showToast('Sonuç kaydedildi');
                // Kartı güncelle (full reload yerine local update)
                const updated = {
                    ...Object.fromEntries([...card.querySelectorAll('[data-field]')].map(el => [el.dataset.field, el.value])),
                    id, iy_result, iy2_result,
                    iy_score: iyInput.value.trim(),
                    ft_score: ftInput.value.trim(),
                    iy_pct: parseFloat(card.querySelector('.pill-val').textContent.replace('%','')),
                    iy2_pct: parseFloat(card.querySelectorAll('.pill-val')[1].textContent.replace('%','')),
                    home_team: card.dataset.home,
                    away_team: card.dataset.away,
                    league: card.dataset.league,
                    match_time: card.dataset.time,
                };
                // Sonuç display'i göster, entry'yi gizle
                card.querySelector('[data-section="card-entry"]').style.display = 'none';
                const existing = card.querySelector('[data-section="result-display"]');
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = resultDisplayHTML(updated);
                const newDisplay = tempDiv.firstElementChild;
                if (existing) existing.replaceWith(newDisplay);
                else card.querySelector('.card-pcts').insertAdjacentElement('afterend', newDisplay);
                newDisplay.querySelector('.result-edit-btn').onclick = () => editResult(newDisplay.querySelector('.result-edit-btn'));
                // Kart border rengini güncelle
                card.className = `match-card ${cardResultClass(updated)}`;
                loadStats(currentDate);
            } else {
                showToast(d.message || 'Hata', true);
            }
        } catch(e) {
            showToast('Bağlantı hatası', true);
        }
        btn.disabled = false;
        btn.textContent = 'Kaydet';
    }

    function editResult(btn) {
        const card = btn.closest('.match-card');
        const display = card.querySelector('[data-section="result-display"]');
        const entry   = card.querySelector('[data-section="card-entry"]');
        if (display) display.style.display = 'none';
        if (entry)   entry.style.display   = '';
    }

    async function sendTelegram(btn) {
        const card = btn.closest('.match-card');
        btn.disabled = true;
        btn.textContent = '📤 Gönderiliyor…';
        try {
            const r = await fetch('/api/iy-gol/telegram', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    home_team:  card.dataset.home,
                    away_team:  card.dataset.away,
                    league:     card.dataset.league,
                    match_time: fmtTime(card.dataset.time),
                })
            });
            const d = await r.json();
            if (d.status === 'success') {
                btn.textContent = '✅ Gönderildi';
                btn.classList.add('sent');
                showToast('Telegram\'a gönderildi!');
            } else {
                btn.textContent = '❌ Hata';
                showToast(d.message || 'Gönderilemedi', true);
            }
        } catch(e) {
            btn.textContent = '❌ Hata';
            showToast('Bağlantı hatası', true);
        }
        setTimeout(() => { btn.disabled = false; if (!btn.classList.contains('sent')) btn.textContent = '📨 Telegram'; }, 3000);
    }

    document.getElementById('scanBtn').onclick = async () => {
        const btn = document.getElementById('scanBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Taranıyor…';
        try {
            const r = await fetch('/api/iy-gol/scan', { method: 'POST' });
            const d = await r.json();
            if (d.status === 'success') {
                showToast(`${d.total} maç bulundu`);
                loadMatches(currentDate);
            } else {
                showToast(d.message || 'Tara başarısız', true);
            }
        } catch(e) {
            showToast('Bağlantı hatası', true);
        }
        btn.disabled = false;
        btn.textContent = '🔍 Tara';
    };

    function showToast(msg, err=false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast' + (err ? ' err' : '') + ' show';
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Init
    setDate(today);
    </script>
</body>
</html>
