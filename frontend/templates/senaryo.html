<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senaryo — BetIQ Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .senaryo-container { max-width: 900px; margin: 0 auto; padding: 24px; }

        .senaryo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid #1e1e3a;
        }
        .senaryo-header h1 { font-size: 22px; font-weight: 800; color: #fff; margin: 0; }
        .senaryo-header-sub { font-size: 12px; color: #555; margin-top: 4px; }

        /* Maç seçici panel */
        .match-selector-panel {
            background: #0d0d1a;
            border: 1px solid #1e1e3a;
            border-radius: 14px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .match-selector-header {
            padding: 14px 18px;
            border-bottom: 1px solid #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .match-selector-title { font-size: 13px; font-weight: 700; color: #fff; }
        .match-selector-actions { display: flex; gap: 8px; }

        .btn-select-all {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-select-all:hover { border-color: #7c3aed; color: #a78bfa; }

        .match-list { padding: 8px 0; }
        .match-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #0f0f1e;
        }
        .match-row:last-child { border-bottom: none; }
        .match-row:hover { background: rgba(124,58,237,0.04); }
        .match-row.selected { background: rgba(124,58,237,0.07); }

        .match-row input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: #7c3aed;
            cursor: pointer;
            flex-shrink: 0;
        }
        .match-row-info { flex: 1; min-width: 0; }
        .match-row-teams {
            font-size: 13px;
            font-weight: 700;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .match-row-teams .vs { color: #444; font-weight: 400; margin: 0 5px; }
        .match-row-meta {
            display: flex;
            gap: 6px;
            margin-top: 3px;
            flex-wrap: wrap;
        }
        .row-badge {
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid;
        }
        .rb-league { border-color: #1e1e3a; color: #555; background: transparent; }
        .rb-pred-1 { border-color: rgba(16,185,129,0.4); color: #10b981; background: rgba(16,185,129,0.06); }
        .rb-pred-x { border-color: rgba(245,158,11,0.4); color: #f59e0b; background: rgba(245,158,11,0.06); }
        .rb-pred-2 { border-color: rgba(59,130,246,0.4); color: #3b82f6; background: rgba(59,130,246,0.06); }
        .rb-conf-yuksek { border-color: rgba(124,58,237,0.4); color: #a78bfa; background: rgba(124,58,237,0.06); }
        .rb-conf-orta   { border-color: rgba(245,158,11,0.4); color: #f59e0b; background: rgba(245,158,11,0.06); }
        .rb-conf-dusuk  { border-color: rgba(239,68,68,0.4);  color: #ef4444; background: rgba(239,68,68,0.06); }
        .rb-score { border-color: #1e1e3a; color: #555; background: transparent; font-family: 'JetBrains Mono', monospace; }

        /* Daha önce üretilmiş badge */
        .rb-done { border-color: rgba(16,185,129,0.4); color: #10b981; background: rgba(16,185,129,0.06); }

        .match-selector-footer {
            padding: 14px 18px;
            border-top: 1px solid #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .selected-count { font-size: 12px; color: #555; }
        .selected-count strong { color: #a78bfa; }

        .btn-generate {
            padding: 10px 22px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-generate:hover:not(:disabled) { background: linear-gradient(135deg, #6d28d9, #5b21b6); transform: translateY(-1px); }
        .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Loading */
        .loading-overlay {
            background: #0d0d1a;
            border: 1px solid #1e1e3a;
            border-radius: 14px;
            padding: 32px 20px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .loading-overlay.visible { display: block; }
        .spinner-lg {
            width: 36px; height: 36px;
            border: 3px solid #1e1e3a;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        .loading-text { font-size: 13px; color: #888; }
        .loading-sub  { font-size: 11px; color: #444; margin-top: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Boş durum */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #444;
        }
        .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { font-size: 13px; line-height: 1.6; }

        /* Senaryo kartları */
        .scenario-card {
            background: #0d0d1a;
            border: 1px solid #1e1e3a;
            border-radius: 14px;
            margin-bottom: 16px;
            overflow: hidden;
            animation: fadeInUp 0.3s ease both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-match-header {
            padding: 14px 18px;
            border-bottom: 1px solid #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .card-match-teams { font-size: 14px; font-weight: 700; color: #fff; }
        .card-match-teams .vs { color: #444; font-weight: 400; margin: 0 6px; }
        .card-match-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .meta-badge {
            padding: 3px 9px; border-radius: 6px;
            font-size: 11px; font-weight: 600; border: 1px solid;
        }
        .meta-league  { border-color: #2a2a4a; color: #666; background: transparent; }
        .meta-pred-1  { border-color: #10b981; color: #10b981; background: rgba(16,185,129,0.08); }
        .meta-pred-x  { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.08); }
        .meta-pred-2  { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,0.08); }
        .meta-conf-yuksek { border-color: #7c3aed; color: #a78bfa; background: rgba(124,58,237,0.08); }
        .meta-conf-orta   { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.08); }
        .meta-conf-dusuk  { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }
        .meta-score { border-color: #1e1e3a; color: #555; background: transparent; font-family: 'JetBrains Mono', monospace; }

        .scenario-tabs {
            display: flex;
            border-bottom: 1px solid #1a1a2e;
            background: #0a0a15;
        }
        .scenario-tab-btn {
            flex: 1; padding: 10px 8px;
            background: transparent; border: none;
            border-bottom: 2px solid transparent;
            color: #444; font-size: 12px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .scenario-tab-btn:hover { color: #888; }
        .scenario-tab-btn.active.tab-en-olasi { color: #10b981; border-bottom-color: #10b981; background: rgba(16,185,129,0.04); }
        .scenario-tab-btn.active.tab-surpriz  { color: #f59e0b; border-bottom-color: #f59e0b; background: rgba(245,158,11,0.04); }
        .scenario-tab-btn.active.tab-dramatik  { color: #a78bfa; border-bottom-color: #7c3aed; background: rgba(124,58,237,0.04); }

        .scenario-panel { display: none; padding: 18px 20px; animation: fadeIn 0.2s ease; }
        .scenario-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .scenario-title { font-size: 14px; font-weight: 800; margin-bottom: 8px; }
        .scenario-story { font-size: 13px; color: #aaa; line-height: 1.7; margin-bottom: 12px; }
        .scenario-keyfactor {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
        }
        .panel-en-olasi .scenario-title { color: #10b981; }
        .panel-en-olasi .scenario-keyfactor { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
        .panel-surpriz  .scenario-title { color: #f59e0b; }
        .panel-surpriz  .scenario-keyfactor { background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
        .panel-dramatik .scenario-title { color: #a78bfa; }
        .panel-dramatik .scenario-keyfactor { background: rgba(124,58,237,0.1); color: #a78bfa; border: 1px solid rgba(124,58,237,0.2); }

        .error-card {
            background: rgba(239,68,68,0.05);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 13px;
            color: #ef4444;
            margin-bottom: 12px;
        }

        /* Nav */
        .sn-nav { display:flex; gap:8px; align-items:center; flex-wrap: wrap; }
        .sn-nav a {
            padding:7px 14px; border-radius:8px;
            border:1px solid #2a1a4e; background:transparent;
            color:#a78bfa; font-size:12px; font-weight:600;
            text-decoration:none; transition:all 0.2s;
        }
        .sn-nav a:hover { background:#2a1a4e; color:#fff; }
        .sn-nav a.active { background:#7c3aed; border-color:#7c3aed; color:#fff; }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">BetIQ</span>
                <span class="logo-sub">ANALYZER</span>
            </div>
            <nav class="sn-nav">
                <a href="/">🏠 Ana Sayfa</a>
                <a href="/gecmis">📅 Geçmiş</a>
                <a href="/istatistik">📊 İstatistik</a>
                <a href="/kuponlar">🎫 Kuponlar</a>
                <a href="/senaryo" class="active">🎭 Senaryo</a>
                <a href="/debug">🔬 Debug</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="senaryo-container">
            <div class="senaryo-header">
                <div>
                    <h1>🎭 Maç Senaryoları</h1>
                    <div class="senaryo-header-sub">Seçili maçlar için AI bazlı 3 farklı senaryo</div>
                </div>
                <div id="headerDate" style="font-size:12px;color:#555;font-family:'JetBrains Mono',monospace;"></div>
            </div>

            <!-- Maç seçici -->
            <div class="match-selector-panel" id="selectorPanel">
                <div class="match-selector-header">
                    <div class="match-selector-title">📋 Bugünün Analiz Edilmiş Maçları</div>
                    <div class="match-selector-actions">
                        <button class="btn-select-all" id="btnSelectAll" onclick="toggleSelectAll()">✅ Tümünü Seç</button>
                    </div>
                </div>
                <div class="match-list" id="matchList">
                    <div style="padding:20px;text-align:center;color:#444;font-size:13px;">
                        <div class="spinner-lg" style="width:24px;height:24px;border-width:2px;margin:0 auto 10px;"></div>
                        Maçlar yükleniyor...
                    </div>
                </div>
                <div class="match-selector-footer">
                    <div class="selected-count" id="selectedCount">0 maç seçildi</div>
                    <button class="btn-generate" id="btnGenerate" disabled onclick="generateScenarios()">
                        🎬 Seçili Maçlar İçin Senaryo Oluştur
                    </button>
                </div>
            </div>

            <!-- Yükleniyor -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner-lg"></div>
                <div class="loading-text" id="loadingText">Senaryolar oluşturuluyor...</div>
                <div class="loading-sub" id="loadingSub">Bu işlem maç başına ~5 saniye sürebilir. Lütfen bekleyin.</div>
            </div>

            <!-- Sonuçlar -->
            <div id="scenarioResults"></div>
        </div>
    </main>
</div>

<script>
    let allMatches = [];        // bugünün tüm analiz edilmiş maçları
    let existingIds = new Set(); // daha önce senaryo üretilmiş analysis_id'ler
    let allSelected = false;

    function today() {
        return new Date().toISOString().slice(0, 10);
    }
    function fmtDate(d) {
        if (!d) return '';
        const [y, m, day] = d.split('-');
        return `${day}.${m}.${y}`;
    }

    function predLabel(pred, home, away) {
        if (pred === '1') return { text: `${home} K.`, cls: 'rb-pred-1' };
        if (pred === '2') return { text: `${away} K.`, cls: 'rb-pred-2' };
        return { text: 'Bera.', cls: 'rb-pred-x' };
    }

    function confClass(conf) {
        if (!conf) return '';
        const c = conf.toLowerCase();
        if (c.includes('yüksek') || c.includes('yuksek')) return 'rb-conf-yuksek';
        if (c.includes('düşük') || c.includes('dusuk'))    return 'rb-conf-dusuk';
        return 'rb-conf-orta';
    }

    function metaConfClass(conf) {
        if (!conf) return '';
        const c = conf.toLowerCase();
        if (c.includes('yüksek') || c.includes('yuksek')) return 'meta-conf-yuksek';
        if (c.includes('düşük') || c.includes('dusuk'))    return 'meta-conf-dusuk';
        return 'meta-conf-orta';
    }

    function renderMatchRow(m) {
        const id  = m.id;
        const pl  = predLabel(m.prediction_1x2, m.home_team, m.away_team);
        const cc  = confClass(m.confidence);
        const isDone = existingIds.has(id);

        const leagueBadge = m.league ? `<span class="row-badge rb-league">${m.league}</span>` : '';
        const scoreBadge  = m.predicted_score ? `<span class="row-badge rb-score">${m.predicted_score}</span>` : '';
        const doneBadge   = isDone ? `<span class="row-badge rb-done">✓ Üretildi</span>` : '';

        return `
<label class="match-row" id="row_${id}" for="chk_${id}">
    <input type="checkbox" id="chk_${id}" value="${id}" onchange="onCheckChange()">
    <div class="match-row-info">
        <div class="match-row-teams">
            ${m.home_team} <span class="vs">vs</span> ${m.away_team}
        </div>
        <div class="match-row-meta">
            ${leagueBadge}
            <span class="row-badge ${pl.cls}">${pl.text}</span>
            ${m.confidence ? `<span class="row-badge ${cc}">${m.confidence}</span>` : ''}
            ${scoreBadge}
            ${doneBadge}
        </div>
    </div>
</label>`;
    }

    function onCheckChange() {
        const checked = document.querySelectorAll('#matchList input[type="checkbox"]:checked');
        const count = checked.length;
        document.getElementById('selectedCount').innerHTML =
            `<strong>${count}</strong> maç seçildi`;
        document.getElementById('btnGenerate').disabled = count === 0;
        allSelected = count === allMatches.length;
        document.getElementById('btnSelectAll').textContent = allSelected ? '☐ Seçimi Kaldır' : '✅ Tümünü Seç';

        // Seçili satır vurgusu
        document.querySelectorAll('#matchList .match-row').forEach(row => {
            const chk = row.querySelector('input[type="checkbox"]');
            row.classList.toggle('selected', chk && chk.checked);
        });
    }

    function toggleSelectAll() {
        const checkboxes = document.querySelectorAll('#matchList input[type="checkbox"]');
        const newState = !allSelected;
        checkboxes.forEach(c => { c.checked = newState; });
        onCheckChange();
    }

    function renderCard(data, index) {
        const home = data.home_team || '?';
        const away = data.away_team || '?';
        const scenarios = data.scenarios || [];

        const pl = { text: '', cls: '' };
        if (data.prediction_1x2 === '1') { pl.text = `${home} Kazanır`; pl.cls = 'meta-pred-1'; }
        else if (data.prediction_1x2 === '2') { pl.text = `${away} Kazanır`; pl.cls = 'meta-pred-2'; }
        else { pl.text = 'Beraberlik'; pl.cls = 'meta-pred-x'; }

        const cc = metaConfClass(data.confidence);
        const league = data.league || '';
        const score  = data.predicted_score || '';

        const scenMap = {};
        scenarios.forEach(s => { scenMap[s.type] = s; });
        const en  = scenMap['en_olasi']     || {};
        const sur = scenMap['surpriz']      || {};
        const fav = scenMap['dramatik'] || {};

        const cardId = `card_${data.analysis_id || index}`;

        return `
<div class="scenario-card" id="${cardId}">
    <div class="card-match-header">
        <div class="card-match-teams">
            ${home} <span class="vs">vs</span> ${away}
        </div>
        <div class="card-match-meta">
            ${league ? `<span class="meta-badge meta-league">${league}</span>` : ''}
            <span class="meta-badge ${pl.cls}">${pl.text}</span>
            ${data.confidence ? `<span class="meta-badge ${cc}">${data.confidence}</span>` : ''}
            ${score ? `<span class="meta-badge meta-score">${score}</span>` : ''}
        </div>
    </div>
    <div class="scenario-tabs">
        <button class="scenario-tab-btn tab-en-olasi active" onclick="switchTab('${cardId}','en_olasi',this)">🎯 En Olası</button>
        <button class="scenario-tab-btn tab-surpriz"         onclick="switchTab('${cardId}','surpriz',this)">⚡ Sürpriz</button>
        <button class="scenario-tab-btn tab-dramatik"         onclick="switchTab('${cardId}','dramatik',this)">🎬 Dramatik</button>
    </div>
    <div class="scenario-panels">
        <div class="scenario-panel panel-en-olasi active" id="${cardId}_en_olasi">
            <div class="scenario-title">${en.title || 'Beklenen Akış'}</div>
            <div class="scenario-story">${en.story || '—'}</div>
            <div class="scenario-keyfactor">⚡ ${en.key_factor || '—'}</div>
        </div>
        <div class="scenario-panel panel-surpriz" id="${cardId}_surpriz">
            <div class="scenario-title">${sur.title || 'Sürpriz Senaryo'}</div>
            <div class="scenario-story">${sur.story || '—'}</div>
            <div class="scenario-keyfactor">⚡ ${sur.key_factor || '—'}</div>
        </div>
        <div class="scenario-panel panel-dramatik" id="${cardId}_dramatik">
            <div class="scenario-title">${fav.title || 'Son Dakika Gerilimi'}</div>
            <div class="scenario-story">${fav.story || '—'}</div>
            <div class="scenario-keyfactor">⚡ ${fav.key_factor || '—'}</div>
        </div>
    </div>
</div>`;
    }

    function switchTab(cardId, type, btn) {
        const card = document.getElementById(cardId);
        if (!card) return;
        card.querySelectorAll('.scenario-panel').forEach(p => p.classList.remove('active'));
        card.querySelectorAll('.scenario-tab-btn').forEach(b => b.classList.remove('active'));
        const panel = document.getElementById(`${cardId}_${type}`);
        if (panel) panel.classList.add('active');
        btn.classList.add('active');
    }

    async function generateScenarios() {
        const checked = Array.from(
            document.querySelectorAll('#matchList input[type="checkbox"]:checked')
        ).map(c => parseInt(c.value));

        if (!checked.length) return;

        // Kontrolleri kilitle
        document.getElementById('btnGenerate').disabled = true;
        document.getElementById('btnSelectAll').disabled = true;
        document.querySelectorAll('#matchList input').forEach(c => c.disabled = true);

        const total = checked.length;
        let done = 0;

        // İlerleme göstergesini güncelle
        function updateProgress() {
            document.getElementById('loadingText').textContent =
                done < total
                    ? `${done} / ${total} maç tamamlandı, devam ediyor...`
                    : `${total} maç tamamlandı!`;
            document.getElementById('loadingSub').textContent =
                done < total
                    ? `Her maç ayrı ayrı işleniyor — lütfen sayfayı kapatmayın.`
                    : ``;
        }

        document.getElementById('loadingOverlay').classList.add('visible');
        updateProgress();

        // Seçili ID'leri sırayla tek tek gönder
        let firstCard = null;
        for (const aid of checked) {
            // Bu satırı "işleniyor" olarak işaretle
            const row = document.getElementById(`row_${aid}`);
            if (row) row.style.opacity = '0.5';

            try {
                const resp = await fetch('/api/scenarios/generate/single', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ analysis_id: aid })
                });

                // JSON olmayan response'u (HTML hata sayfası vb.) güvenli yakala
                const ct = resp.headers.get('content-type') || '';
                let body;
                if (ct.includes('application/json')) {
                    body = await resp.json();
                } else {
                    const text = await resp.text();
                    throw new Error(`HTTP ${resp.status} — sunucu JSON döndürmedi. İlk 120 karakter: ${text.slice(0, 120)}`);
                }

                if (resp.ok && body.status === 'ok') {
                    const cardHtml = renderCard(body, done);
                    document.getElementById('scenarioResults').insertAdjacentHTML('beforeend', cardHtml);
                    existingIds.add(body.analysis_id);

                    // İlk kart için scroll hedefi
                    if (!firstCard) {
                        firstCard = document.getElementById(`card_${body.analysis_id}`);
                    }

                    // Satıra "✓ Üretildi" badge ekle
                    if (row) {
                        row.style.opacity = '1';
                        const meta = row.querySelector('.match-row-meta');
                        if (meta && !meta.querySelector('.rb-done')) {
                            meta.insertAdjacentHTML('beforeend', `<span class="row-badge rb-done">✓ Üretildi</span>`);
                        }
                    }
                } else {
                    const msg = body.message || 'Senaryo üretilemedi';
                    // Maç adını bul
                    const matchInfo = allMatches.find(m => m.id === aid);
                    const label = matchInfo ? `${matchInfo.home_team} vs ${matchInfo.away_team}` : `#${aid}`;
                    document.getElementById('scenarioResults').insertAdjacentHTML('beforeend',
                        `<div class="error-card">⚠️ ${label}: ${msg}</div>`);
                    if (row) row.style.opacity = '1';
                }
            } catch (e) {
                const matchInfo = allMatches.find(m => m.id === aid);
                const label = matchInfo ? `${matchInfo.home_team} vs ${matchInfo.away_team}` : `#${aid}`;
                document.getElementById('scenarioResults').insertAdjacentHTML('beforeend',
                    `<div class="error-card">⚠️ ${label}: Bağlantı hatası — ${e.message}</div>`);
                if (row) row.style.opacity = '1';
            }

            done++;
            updateProgress();
        }

        document.getElementById('loadingOverlay').classList.remove('visible');

        // İlk karta scroll
        if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

        // Kontrolleri geri aç
        document.getElementById('btnGenerate').disabled = false;
        document.getElementById('btnSelectAll').disabled = false;
        document.querySelectorAll('#matchList input').forEach(c => c.disabled = false);
        onCheckChange();
    }

    async function loadPage() {
        const d = today();
        document.getElementById('headerDate').textContent = fmtDate(d);

        // Mevcut senaryoları çek
        let existingData = [];
        try {
            const res = await fetch('/api/scenarios/today');
            if (res.ok) {
                const body = await res.json();
                existingData = body.data || [];
                existingData.forEach(e => existingIds.add(e.analysis_id));
            }
        } catch (_) {}

        // Bugünün maçlarını çek
        try {
            const res = await fetch('/api/matches/today');
            allMatches = await res.json();
        } catch (e) {
            document.getElementById('matchList').innerHTML =
                `<div style="padding:20px;text-align:center;color:#ef4444;font-size:13px;">Maçlar yüklenemedi: ${e.message}</div>`;
            return;
        }

        if (!allMatches.length) {
            document.getElementById('matchList').innerHTML =
                `<div class="empty-state"><div class="empty-icon">📭</div><p>Bugün için analiz edilmiş maç yok.</p></div>`;
            return;
        }

        document.getElementById('matchList').innerHTML = allMatches.map(renderMatchRow).join('');
        onCheckChange();

        // Mevcut senaryoları direkt göster
        if (existingData.length) {
            existingData.forEach((d, i) => {
                if (d.scenarios && d.scenarios.length) {
                    document.getElementById('scenarioResults').insertAdjacentHTML('beforeend', renderCard(d, i));
                }
            });
        }
    }

    window.addEventListener('DOMContentLoaded', loadPage);
</script>
</body>
</html>
