<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetIQ — Geçmiş Analizler</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/tr.js"></script>
    <style>
        .gecmis-container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* ─── Takvim Picker ─── */
        .date-picker-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .date-picker-label {
            font-size: 13px;
            color: #666;
        }
        .date-picker-input-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .date-picker-input-wrap .cal-icon {
            position: absolute;
            left: 12px;
            font-size: 16px;
            pointer-events: none;
            z-index: 1;
        }
        #datePicker {
            padding: 10px 16px 10px 38px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-width: 160px;
            transition: border-color 0.2s;
            outline: none;
        }
        #datePicker:focus, #datePicker:hover {
            border-color: #7c3aed;
        }
        .date-nav-btns {
            display: flex;
            gap: 6px;
        }
        .date-nav-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .date-nav-btn:hover {
            border-color: #7c3aed;
            color: #fff;
        }
        .date-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .current-date-badge {
            background: #7c3aed22;
            border: 1px solid #7c3aed55;
            color: #a78bfa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Flatpickr dark tema override */
        .flatpickr-calendar {
            background: #1a1a2e !important;
            border: 1px solid #333 !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        }
        .flatpickr-month, .flatpickr-weekdays, .flatpickr-day {
            color: #fff !important;
        }
        .flatpickr-day {
            color: #aaa !important;
            border-radius: 8px !important;
        }
        .flatpickr-day:hover {
            background: #7c3aed33 !important;
            color: #fff !important;
            border-color: transparent !important;
        }
        .flatpickr-day.selected, .flatpickr-day.selected:hover {
            background: #7c3aed !important;
            border-color: #7c3aed !important;
            color: #fff !important;
        }
        .flatpickr-day.flatpickr-disabled {
            color: #333 !important;
        }
        .flatpickr-months .flatpickr-month {
            background: #1a1a2e !important;
            color: #fff !important;
        }
        .flatpickr-current-month, .flatpickr-current-month .numInputWrapper input {
            color: #fff !important;
        }
        .flatpickr-weekday {
            color: #7c3aed !important;
            background: #1a1a2e !important;
        }
        .flatpickr-prev-month svg, .flatpickr-next-month svg {
            fill: #aaa !important;
        }
        .flatpickr-prev-month:hover svg, .flatpickr-next-month:hover svg {
            fill: #7c3aed !important;
        }
        /* Analizi olan günleri işaretle */
        .flatpickr-day.has-data {
            background: #7c3aed22 !important;
            border: 1px solid #7c3aed55 !important;
            color: #fff !important;
            font-weight: 700 !important;
        }
        .flatpickr-day.has-data.selected {
            background: #7c3aed !important;
        }

        .summary-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; padding: 16px; background: #1a1a2e; border-radius: 12px; border: 1px solid #333; }
        .summary-item { text-align: center; }
        .summary-item .s-value { font-size: 22px; font-weight: 800; color: #7c3aed; }
        .summary-item .s-label { font-size: 11px; color: #666; margin-top: 2px; }
        .result-card { background: #12121f; border: 1px solid #2a2a3e; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
        .result-card.correct { border-left: 3px solid #22c55e; }
        .result-card.wrong { border-left: 3px solid #ef4444; }
        .result-card.pending { border-left: 3px solid #f59e0b; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .result-teams { font-size: 16px; font-weight: 700; color: #fff; }
        .result-score { font-size: 20px; font-weight: 800; color: #7c3aed; }
        .result-score.pending-score { color: #f59e0b; font-size: 14px; }
        .result-preds { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .pred-item { display: flex; align-items: center; gap: 6px; background: #1a1a2e; padding: 6px 12px; border-radius: 8px; font-size: 12px; }
        .pred-item .tick { font-size: 14px; }
        .pred-label { color: #888; }
        .pred-value { color: #fff; font-weight: 600; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: #7c3aed; text-decoration: none; font-weight: 600; margin-bottom: 20px; font-size: 14px; }
        .back-btn:hover { color: #a855f7; }
        .no-data { text-align: center; padding: 60px 20px; color: #555; }
        .league-small { font-size: 11px; color: #666; margin-top: 2px; }
        .score-form { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .score-input { width: 52px; padding: 6px 8px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #fff; font-size: 16px; font-weight: 700; text-align: center; font-family: inherit; }
        .score-input:focus { outline: none; border-color: #7c3aed; }
        .score-sep { color: #666; font-size: 18px; font-weight: 700; }
        .btn-save-score { padding: 6px 14px; border-radius: 8px; border: none; background: #7c3aed; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .btn-save-score:hover { background: #a855f7; }
        .btn-enter-score { padding: 5px 12px; border-radius: 8px; border: 1px solid #444; background: transparent; color: #888; font-size: 11px; cursor: pointer; font-family: inherit; margin-top: 10px; transition: all 0.2s; }
        .btn-enter-score:hover { border-color: #7c3aed; color: #7c3aed; }
        .btn-edit-score { padding: 5px 12px; border-radius: 8px; border: 1px solid #444; background: transparent; color: #888; font-size: 11px; cursor: pointer; font-family: inherit; margin-top: 10px; transition: all 0.2s; }
        .btn-edit-score:hover { border-color: #f59e0b; color: #f59e0b; }
        .save-msg { font-size: 12px; color: #22c55e; margin-left: 8px; }
        .btn-report { padding: 10px 20px; border-radius: 10px; border: none; background: #7c3aed; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.2s; margin-bottom: 20px; }
        .btn-report:hover { background: #a855f7; }
        .btn-share { padding: 5px 12px; border-radius: 8px; border: 1px solid #7c3aed; background: transparent; color: #7c3aed; font-size: 11px; cursor: pointer; font-family: inherit; margin-top: 10px; margin-left: 8px; transition: all 0.2s; }
        .btn-share:hover { background: #7c3aed; color: #fff; }

        /* ─── Paylaşım Kartı ─── */
        .share-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; }
        .share-overlay.active { display: flex; }
        .share-modal { background: #0d0d1a; border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; }
        .share-modal h3 { color: #fff; margin-bottom: 16px; font-size: 15px; }
        .share-card-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
        .share-card { width: 400px; height: 400px; background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 100%); border-radius: 16px; padding: 28px; display: flex; flex-direction: column; justify-content: space-between; font-family: 'Syne', sans-serif; position: relative; overflow: hidden; border: 1px solid #2a1a4e; }
        .share-card::before { content: ''; position: absolute; top: -60px; right: -60px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(124,58,237,0.3) 0%, transparent 70%); }
        .share-card-header { display: flex; justify-content: space-between; align-items: center; }
        .share-card-logo { font-size: 13px; font-weight: 800; color: #7c3aed; letter-spacing: 1px; }
        .share-card-league { font-size: 11px; color: #666; background: #1a1a2e; padding: 4px 10px; border-radius: 20px; }
        .share-card-teams { text-align: center; padding: 8px 0; }
        .share-card-teams .teams-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .share-team-name { font-size: 18px; font-weight: 800; color: #fff; flex: 1; }
        .share-team-name.home { text-align: right; }
        .share-team-name.away { text-align: left; }
        .share-vs { font-size: 13px; color: #555; font-weight: 600; flex-shrink: 0; }
        .share-result-score { font-size: 36px; font-weight: 800; color: #7c3aed; text-align: center; margin: 4px 0; letter-spacing: 2px; }
        .share-ht-score { font-size: 12px; color: #555; text-align: center; }
        .share-card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .share-stat { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
        .share-stat-tick { font-size: 16px; line-height: 1; }
        .share-stat-info { flex: 1; }
        .share-stat-label { font-size: 10px; color: #666; }
        .share-stat-value { font-size: 13px; font-weight: 700; color: #fff; }
        .share-card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #2a2a3e; padding-top: 10px; }
        .share-footer-pred { font-size: 11px; color: #888; }
        .share-footer-pred span { color: #7c3aed; font-weight: 700; }
        .share-pending-badge { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; text-align: center; }
        .share-modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-download { padding: 10px 20px; border-radius: 10px; border: none; background: #7c3aed; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .btn-close-share { padding: 10px 20px; border-radius: 10px; border: 1px solid #333; background: transparent; color: #aaa; font-size: 13px; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">BetIQ</span>
                    <span class="logo-sub">ANALYZER</span>
                </div>
            </div>
        </header>
        <main class="main-content">
            <div class="gecmis-container">
                <a href="/" class="back-btn">← Ana Sayfa</a>
                <h2 style="color:#fff; margin-bottom:20px;">📅 Geçmiş Analizler</h2>

                <!-- Takvim Picker -->
                <div class="date-picker-wrap">
                    <span class="date-picker-label">Tarih seç:</span>
                    <div class="date-picker-input-wrap">
                        <span class="cal-icon">📅</span>
                        <input type="text" id="datePicker" placeholder="Tarih seç..." readonly>
                    </div>
                    <div class="date-nav-btns">
                        <button class="date-nav-btn" id="prevDayBtn" onclick="navigateDay(-1)" title="Önceki gün">◀</button>
                        <button class="date-nav-btn" id="nextDayBtn" onclick="navigateDay(1)" title="Sonraki gün">▶</button>
                    </div>
                    <span class="current-date-badge" id="currentDateBadge" style="display:none;"></span>
                </div>

                <div id="summaryBar" style="display:none;" class="summary-bar">
                    <div class="summary-item"><div class="s-value" id="totalMatches">0</div><div class="s-label">Toplam Maç</div></div>
                    <div class="summary-item"><div class="s-value" id="correct1x2">0%</div><div class="s-label">1X2 Doğru</div></div>
                    <div class="summary-item"><div class="s-value" id="correctOver25">0%</div><div class="s-label">2.5 Üstü</div></div>
                    <div class="summary-item"><div class="s-value" id="correctBtts">0%</div><div class="s-label">KG Var</div></div>
                    <div class="summary-item"><div class="s-value" id="correctHt">-</div><div class="s-label">İY 0.5 Üst</div></div>
                    <div class="summary-item"><div class="s-value" id="correctScore">0</div><div class="s-label">Skor Doğru</div></div>
                </div>

                <div id="reportBtnWrapper" style="display:none;">
                    <button class="btn-report" onclick="sendReport()">📊 Telegram'a Rapor Gönder</button>
                    <span id="reportMsg" style="font-size:13px; margin-left:10px;"></span>
                </div>

                <div id="matchesContainer">
                    <div class="no-data">Yukarıdan bir tarih seç</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Paylaşım Overlay -->
    <div class="share-overlay" id="shareOverlay" onclick="closeShare(event)">
        <div class="share-modal" onclick="event.stopPropagation()">
            <h3>📸 Instagram / X Paylaşım Kartı</h3>
            <div class="share-card-wrap">
                <div class="share-card" id="shareCard"></div>
            </div>
            <div class="share-modal-btns">
                <button class="btn-close-share" onclick="closeShareModal()">İptal</button>
                <button class="btn-download" onclick="downloadShareCard()">⬇️ PNG İndir</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = null;
        let currentMatches = [];
        let shareMatchData = null;
        let availableDates = [];
        let calendarInstance = null;

        async function loadDates() {
            const resp = await fetch('/api/dates');
            availableDates = await resp.json();

            if (!availableDates.length) {
                document.getElementById('datePicker').placeholder = 'Henüz analiz yok';
                return;
            }

            // Flatpickr başlat
            calendarInstance = flatpickr('#datePicker', {
                locale: 'tr',
                dateFormat: 'd/m/Y',
                disableMobile: true,
                onDayCreate: function(dObj, dStr, fp, dayElem) {
                    // Analizi olan günleri işaretle
                    const d = dayElem.dateObj;
                    const dateStr = d.getFullYear() + '-' +
                        String(d.getMonth()+1).padStart(2,'0') + '-' +
                        String(d.getDate()).padStart(2,'0');
                    if (availableDates.includes(dateStr)) {
                        dayElem.classList.add('has-data');
                    }
                },
                onChange: function(selectedDates, dateStr, instance) {
                    if (selectedDates.length > 0) {
                        const d = selectedDates[0];
                        const isoDate = d.getFullYear() + '-' +
                            String(d.getMonth()+1).padStart(2,'0') + '-' +
                            String(d.getDate()).padStart(2,'0');
                        loadDate(isoDate);
                    }
                }
            });

            // En son tarihi otomatik seç
            loadDate(availableDates[0]);
            const parts = availableDates[0].split('-');
            calendarInstance.setDate(`${parts[2]}/${parts[1]}/${parts[0]}`);
        }

        function navigateDay(direction) {
            if (!currentDate || !availableDates.length) return;
            const idx = availableDates.indexOf(currentDate);
            const newIdx = idx - direction; // dates newest-first
            if (newIdx >= 0 && newIdx < availableDates.length) {
                const newDate = availableDates[newIdx];
                const parts = newDate.split('-');
                calendarInstance.setDate(`${parts[2]}/${parts[1]}/${parts[0]}`);
                loadDate(newDate);
            }
            updateNavBtns();
        }

        function updateNavBtns() {
            if (!currentDate || !availableDates.length) return;
            const idx = availableDates.indexOf(currentDate);
            document.getElementById('prevDayBtn').disabled = (idx >= availableDates.length - 1);
            document.getElementById('nextDayBtn').disabled = (idx <= 0);
        }

        async function loadDate(date) {
            currentDate = date;
            updateNavBtns();

            // Badge güncelle
            const badge = document.getElementById('currentDateBadge');
            badge.textContent = formatDate(date);
            badge.style.display = 'inline-block';

            document.getElementById('matchesContainer').innerHTML = '<div class="no-data">Yükleniyor...</div>';
            document.getElementById('summaryBar').style.display = 'none';
            document.getElementById('reportBtnWrapper').style.display = 'none';

            const resp = await fetch(`/api/matches/date/${date}`);
            const matches = await resp.json();
            currentMatches = matches;

            if (!matches.length) {
                document.getElementById('matchesContainer').innerHTML = '<div class="no-data">Bu tarihte analiz bulunamadı.</div>';
                return;
            }
            renderSummary(matches);
            renderMatches(matches);
            document.getElementById('reportBtnWrapper').style.display = 'block';
        }

        function renderSummary(matches) {
            const withResults = matches.filter(m => m.home_score !== null && m.home_score !== undefined);
            const withHt = withResults.filter(m => m.ht_home_score !== null && m.ht_home_score !== undefined);
            document.getElementById('totalMatches').textContent = matches.length;
            if (withResults.length > 0) {
                document.getElementById('correct1x2').textContent = `${Math.round(withResults.filter(m=>m.pred_1x2_correct).length/withResults.length*100)}%`;
                document.getElementById('correctOver25').textContent = `${Math.round(withResults.filter(m=>m.over25_correct).length/withResults.length*100)}%`;
                document.getElementById('correctBtts').textContent = `${Math.round(withResults.filter(m=>m.btts_correct).length/withResults.length*100)}%`;
                document.getElementById('correctScore').textContent = withResults.filter(m=>m.score_correct).length;
                document.getElementById('correctHt').textContent = withHt.length > 0 ? `${Math.round(withHt.filter(m=>m.ht_correct).length/withHt.length*100)}%` : '-';
            } else {
                ['correct1x2','correctOver25','correctBtts','correctScore','correctHt'].forEach(id => document.getElementById(id).textContent = '-');
            }
            document.getElementById('summaryBar').style.display = 'flex';
        }

        function renderMatches(matches) {
            document.getElementById('matchesContainer').innerHTML = matches.map(m => createCard(m)).join('');
        }

        function createCard(m) {
            const hasResult = m.home_score !== null && m.home_score !== undefined;
            const hasHt = m.ht_home_score !== null && m.ht_home_score !== undefined;
            const cardClass = hasResult ? (m.pred_1x2_correct ? 'correct' : 'wrong') : 'pending';
            const pred = m.prediction_1x2 || '?';
            const predText = { '1': '1 (Ev)', 'X': 'X (Beraberlik)', '2': '2 (Dep)' }[pred] || pred;

            const scoreHtml = hasResult
                ? `<div><div class="result-score">${m.home_score} - ${m.away_score}</div>${hasHt ? `<div style="font-size:11px;color:#888;text-align:right;">İY: ${m.ht_home_score}-${m.ht_away_score}</div>` : ''}</div>`
                : `<div class="result-score pending-score">⏳ Sonuç Bekleniyor</div>`;

            const scoreFormHtml = `
                <div style="margin-top:10px;">
                    <button class="btn-${hasResult ? 'edit' : 'enter'}-score" onclick="toggleScoreForm(${m.id})">${hasResult ? '✏️ Skoru Düzenle' : '✏️ Skor Gir'}</button>
                    <button class="btn-share" onclick="openShare(${m.id})">📸 Paylaş</button>
                    <div id="scoreForm-${m.id}" style="display:none; margin-top:10px;">
                        <div style="font-size:11px;color:#888;margin-bottom:6px;">Maç Sonu Skoru</div>
                        <div class="score-form">
                            <input type="number" min="0" max="20" class="score-input" id="hs-${m.id}" placeholder="0" value="${hasResult ? m.home_score : ''}">
                            <span class="score-sep">-</span>
                            <input type="number" min="0" max="20" class="score-input" id="as-${m.id}" placeholder="0" value="${hasResult ? m.away_score : ''}">
                        </div>
                        <div style="font-size:11px;color:#888;margin:8px 0 6px 0;">İlk Yarı Skoru <span style="color:#555;">(opsiyonel)</span></div>
                        <div class="score-form">
                            <input type="number" min="0" max="20" class="score-input" id="hths-${m.id}" placeholder="0" value="${hasHt ? m.ht_home_score : ''}">
                            <span class="score-sep">-</span>
                            <input type="number" min="0" max="20" class="score-input" id="htas-${m.id}" placeholder="0" value="${hasHt ? m.ht_away_score : ''}">
                        </div>
                        <div style="margin-top:10px;">
                            <button class="btn-save-score" onclick="saveScore(${m.id})">💾 Kaydet</button>
                            <span class="save-msg" id="saveMsg-${m.id}"></span>
                        </div>
                    </div>
                </div>`;

            const htPredHtml = hasHt ? `
                <div class="pred-item">
                    <span class="tick">${m.ht_correct ? '✅' : '❌'}</span>
                    <span class="pred-label">İY 0.5 Üst:</span>
                    <span class="pred-value">%${Math.round(m.ht2g_pct || 0)} → İY ${m.ht_home_score}-${m.ht_away_score}</span>
                </div>` : '';

            const predsHtml = hasResult ? `
                <div class="result-preds">
                    <div class="pred-item"><span class="tick">${m.pred_1x2_correct?'✅':'❌'}</span><span class="pred-label">1X2:</span><span class="pred-value">${predText} → ${m.actual_1x2}</span></div>
                    <div class="pred-item"><span class="tick">${m.over25_correct?'✅':'❌'}</span><span class="pred-label">2.5 Gol:</span><span class="pred-value">%${Math.round(m.over25_pct)} → ${m.actual_over25?'Üstü':'Altı'}</span></div>
                    <div class="pred-item"><span class="tick">${m.btts_correct?'✅':'❌'}</span><span class="pred-label">KG Var:</span><span class="pred-value">%${Math.round(m.btts_pct)} → ${m.actual_btts?'Var':'Yok'}</span></div>
                    ${htPredHtml}
                    <div class="pred-item"><span class="tick">${m.score_correct?'✅':'❌'}</span><span class="pred-label">Skor:</span><span class="pred-value">${m.predicted_score||'?-?'}</span></div>
                </div>${scoreFormHtml}` : `
                <div class="result-preds">
                    <div class="pred-item"><span class="pred-label">1X2:</span><span class="pred-value">${predText}</span></div>
                    <div class="pred-item"><span class="pred-label">2.5 Gol:</span><span class="pred-value">%${Math.round(m.over25_pct||0)}</span></div>
                    <div class="pred-item"><span class="pred-label">KG Var:</span><span class="pred-value">%${Math.round(m.btts_pct||0)}</span></div>
                    <div class="pred-item"><span class="pred-label">İY 0.5 Üst:</span><span class="pred-value">%${Math.round(m.ht2g_pct||0)}</span></div>
                    <div class="pred-item"><span class="pred-label">Tahmini Skor:</span><span class="pred-value">${m.predicted_score||'?-?'}</span></div>
                </div>${scoreFormHtml}`;

            return `
                <div class="result-card ${cardClass}" id="card-${m.id}">
                    <div class="result-header">
                        <div>
                            <div class="result-teams">${m.home_team} vs ${m.away_team}</div>
                            <div class="league-small">🏆 ${m.league||''} &nbsp; 🕐 ${formatTime(m.match_time)}</div>
                        </div>
                        ${scoreHtml}
                    </div>
                    ${predsHtml}
                </div>`;
        }

        // ─── Paylaşım Kartı ───────────────────────────────────────────
        function openShare(matchId) {
            const m = currentMatches.find(x => x.id === matchId);
            if (!m) return;
            shareMatchData = m;
            buildShareCard(m);
            document.getElementById('shareOverlay').classList.add('active');
        }

        function buildShareCard(m) {
            const hasResult = m.home_score !== null && m.home_score !== undefined;
            const hasHt = m.ht_home_score !== null && m.ht_home_score !== undefined;
            const pred = m.prediction_1x2 || '?';
            const predText = { '1': '1 (Ev)', 'X': 'Beraberlik', '2': '2 (Dep)' }[pred] || pred;

            const stats = hasResult ? `
                <div class="share-card-stats">
                    <div class="share-stat"><span class="share-stat-tick">${m.pred_1x2_correct ? '✅' : '❌'}</span><div class="share-stat-info"><div class="share-stat-label">1X2 TAHMİN</div><div class="share-stat-value">${predText} → ${m.actual_1x2 || '?'}</div></div></div>
                    <div class="share-stat"><span class="share-stat-tick">${m.over25_correct ? '✅' : '❌'}</span><div class="share-stat-info"><div class="share-stat-label">2.5 GOL ÜSTÜ</div><div class="share-stat-value">%${Math.round(m.over25_pct||0)} → ${m.actual_over25 ? 'Üstü' : 'Altı'}</div></div></div>
                    <div class="share-stat"><span class="share-stat-tick">${m.btts_correct ? '✅' : '❌'}</span><div class="share-stat-info"><div class="share-stat-label">KG VAR (BTTS)</div><div class="share-stat-value">%${Math.round(m.btts_pct||0)} → ${m.actual_btts ? 'Var' : 'Yok'}</div></div></div>
                    <div class="share-stat"><span class="share-stat-tick">${hasHt ? (m.ht_correct ? '✅' : '❌') : '—'}</span><div class="share-stat-info"><div class="share-stat-label">İY 0.5 ÜST</div><div class="share-stat-value">%${Math.round(m.ht2g_pct||0)}${hasHt ? ' → İY ' + m.ht_home_score + '-' + m.ht_away_score : ''}</div></div></div>
                </div>` : `
                <div class="share-pending-badge">⏳ Sonuç Henüz Girilmedi</div>
                <div class="share-card-stats" style="margin-top:8px;">
                    <div class="share-stat"><div class="share-stat-info"><div class="share-stat-label">1X2 TAHMİN</div><div class="share-stat-value">${predText}</div></div></div>
                    <div class="share-stat"><div class="share-stat-info"><div class="share-stat-label">2.5 GOL</div><div class="share-stat-value">%${Math.round(m.over25_pct||0)}</div></div></div>
                    <div class="share-stat"><div class="share-stat-info"><div class="share-stat-label">KG VAR</div><div class="share-stat-value">%${Math.round(m.btts_pct||0)}</div></div></div>
                    <div class="share-stat"><div class="share-stat-info"><div class="share-stat-label">İY 0.5 ÜST</div><div class="share-stat-value">%${Math.round(m.ht2g_pct||0)}</div></div></div>
                </div>`;

            document.getElementById('shareCard').innerHTML = `
                <div class="share-card-header">
                    <img src="/static/img/logo.png" alt="Logo" style="height:28px; object-fit:contain;" onerror="this.style.display='none'">
                    <div class="share-card-league">${m.league || 'Lig'}</div>
                </div>
                <div class="share-card-teams">
                    <div class="teams-row">
                        <div class="share-team-name home">${m.home_team}</div>
                        <div class="share-vs">VS</div>
                        <div class="share-team-name away">${m.away_team}</div>
                    </div>
                    ${hasResult ? `<div class="share-result-score">${m.home_score} — ${m.away_score}</div>${hasHt ? `<div class="share-ht-score">İY: ${m.ht_home_score}-${m.ht_away_score}</div>` : ''}` : ''}
                </div>
                ${stats}
                <div class="share-card-footer">
                    <div class="share-footer-pred">Tahmin: <span>${predText}</span> &nbsp;|&nbsp; Güven: <span>${m.confidence || 'Orta'}</span></div>
                </div>`;
        }

        function closeShare(e) { if (e.target === document.getElementById('shareOverlay')) closeShareModal(); }
        function closeShareModal() { document.getElementById('shareOverlay').classList.remove('active'); }

        async function downloadShareCard() {
            const card = document.getElementById('shareCard');
            const btn = document.querySelector('.btn-download');
            btn.textContent = '⏳ Hazırlanıyor...';
            btn.disabled = true;
            try {
                const canvas = await html2canvas(card, { scale: 2, backgroundColor: null, useCORS: true, logging: false });
                const link = document.createElement('a');
                const name = shareMatchData ? `${shareMatchData.home_team}_vs_${shareMatchData.away_team}.png`.replace(/\s+/g, '_') : 'betiq_kart.png';
                link.download = name;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch(e) { alert('PNG oluşturulamadı: ' + e.message); }
            btn.textContent = '⬇️ PNG İndir';
            btn.disabled = false;
        }

        function toggleScoreForm(id) {
            const form = document.getElementById(`scoreForm-${id}`);
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function saveScore(analysisId) {
            const hs = parseInt(document.getElementById(`hs-${analysisId}`).value);
            const as_ = parseInt(document.getElementById(`as-${analysisId}`).value);
            const hths = document.getElementById(`hths-${analysisId}`).value;
            const htas = document.getElementById(`htas-${analysisId}`).value;
            const msg = document.getElementById(`saveMsg-${analysisId}`);
            if (isNaN(hs) || isNaN(as_)) { msg.textContent = '❌ Maç sonu skorunu gir!'; msg.style.color = '#ef4444'; return; }
            try {
                const resp = await fetch('/api/results/manual', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ analysis_id: analysisId, home_score: hs, away_score: as_, ht_home_score: hths !== '' ? parseInt(hths) : null, ht_away_score: htas !== '' ? parseInt(htas) : null })
                });
                const data = await resp.json();
                if (data.status === 'success') { msg.textContent = '✅ Kaydedildi!'; msg.style.color = '#22c55e'; setTimeout(() => loadDate(currentDate), 1000); }
                else { msg.textContent = '❌ Hata!'; msg.style.color = '#ef4444'; }
            } catch (e) { msg.textContent = '❌ Hata!'; msg.style.color = '#ef4444'; }
        }

        async function sendReport() {
            const btn = document.querySelector('.btn-report');
            const msgEl = document.getElementById('reportMsg');
            btn.disabled = true; btn.textContent = '⏳ Gönderiliyor...'; msgEl.textContent = '';
            try {
                const resp = await fetch('/api/report/daily', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date: currentDate }) });
                const data = await resp.json();
                if (data.status === 'success') { msgEl.textContent = '✅ Rapor gönderildi!'; msgEl.style.color = '#22c55e'; }
                else { msgEl.textContent = '❌ Hata!'; msgEl.style.color = '#ef4444'; }
            } catch (e) { msgEl.textContent = '❌ Hata!'; msgEl.style.color = '#ef4444'; }
            btn.disabled = false; btn.textContent = '📊 Telegram\'a Rapor Gönder';
        }

        function formatDate(d) { const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
        function formatTime(dateStr) { try { const d = new Date(dateStr); return d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Istanbul'}); } catch { return '--:--'; } }

        loadDates();
    </script>
</body>
</html>
