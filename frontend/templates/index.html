<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetIQ Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">BetIQ</span>
                    <span class="logo-sub">ANALYZER</span>
                </div>
            </div>
        </header>
        <main class="main-content">
            <div class="two-column">
                <div class="left-panel">
                    <div class="panel-header">
                        <h2>📅 Bugünün Maçları</h2>
                        <div class="panel-actions">
                            <button id="refreshFixtures" class="btn-secondary">🔄 Yenile</button>
                            <button id="selectAll" class="btn-secondary">✅ Tümünü Seç</button>
                        </div>
                    </div>
                    <div id="fixturesList">
                        <div class="loading-fixtures">
                            <div class="spinner"></div>
                            <span>Maçlar yükleniyor...</span>
                        </div>
                    </div>

                    <!-- CSV Yükleme -->
                    <div class="manual-section">
                        <h3>📁 CSV ile Maç Ekle</h3>
                        <p style="font-size:11px;color:#555;margin:0 0 8px 0;">FootyStats günlük CSV dosyasını yükle</p>
                        <div class="manual-form">
                            <input type="file" id="csvUpload" accept=".csv" style="display:none">
                            <button id="csvUploadBtn" class="btn-add" style="background:#1a1a2e;border:1px dashed #555;color:#aaa;">
                                📁 CSV Dosyası Seç
                            </button>
                            <div id="csvStatus" style="font-size:12px;color:#888;margin-top:6px;"></div>
                        </div>
                    </div>

                    <!-- Görsel Yükleme -->
                    <div class="manual-section">
                        <h3>📸 Görselden Maç Ekle</h3>
                        <div class="manual-form">
                            <input type="file" id="imageUpload" accept="image/*" style="display:none">
                            <button id="imageUploadBtn" class="btn-add" style="background:#1a1a2e;border:1px dashed #555;color:#aaa;">
                                📸 Maç Programı Görseli Seç
                            </button>
                            <div id="imagePreview" style="display:none;margin-top:8px;">
                                <img id="previewImg" style="max-width:100%;border-radius:8px;border:1px solid #333;">
                            </div>
                            <div id="imageStatus" style="font-size:12px;color:#888;margin-top:6px;"></div>
                        </div>
                    </div>

                    <!-- Manuel Maç Ekleme -->
                    <div class="manual-section">
                        <h3>➕ Manuel Maç Ekle</h3>
                        <div class="manual-form">
                            <input type="text" id="homeTeam" placeholder="Ev Sahibi Takım" class="input-field">
                            <input type="text" id="awayTeam" placeholder="Deplasman Takımı" class="input-field">
                            <input type="text" id="leagueName" placeholder="Lig Adı (opsiyonel)" class="input-field">
                            <input type="time" id="matchTime" class="input-field">
                            <button id="addManual" class="btn-add">➕ Listeye Ekle</button>
                        </div>
                        <div id="manualList"></div>
                    </div>

                    <div class="analyze-section">
                        <div id="selectedCount" class="selected-count">0 maç seçildi</div>
                        <button id="analyzeBtn" class="analyze-btn" disabled>
                            🔍 Seçilenleri Analiz Et
                        </button>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="panel-header">
                        <h2>🧠 Analiz Sonuçları</h2>
                    </div>
                    <div id="analysisStatus"></div>
                    <div id="matchesContainer">
                        <div class="no-matches">
                            <p>📭 Henüz analiz yapılmadı.</p>
                            <p>Sol taraftan maç seçip analiz et.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
