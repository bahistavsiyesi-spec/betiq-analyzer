<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetIQ Analyzer - Maç Analizi</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .csv-upload-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .csv-upload-card h3 {
            margin-top: 0;
            color: white;
        }
        
        #csvUploadForm {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        #csvUploadForm input[type="file"] {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
        }
        
        #csvUploadForm input[type="file"]::file-selector-button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
        }
        
        #csvUploadForm button {
            flex: 0 0 auto;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        #csvUploadForm button:hover {
            background: white;
            color: #667eea;
        }
        
        #csvUploadStatus {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        
        #csvUploadStatus .loading {
            color: #fff;
            animation: pulse 1s infinite;
        }
        
        #csvUploadStatus .success {
            background: rgba(0,255,0,0.2);
            color: #0f0;
            border-left: 4px solid #0f0;
        }
        
        #csvUploadStatus .error {
            background: rgba(255,0,0,0.2);
            color: #f00;
            border-left: 4px solid #f00;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .match-card {
            background: #1a1a2e;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            color: #ddd;
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .match-teams {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
        
        .match-league {
            font-size: 12px;
            color: #999;
        }
        
        .match-prediction {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .prediction-item {
            background: #0f0f1e;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-size: 12px;
        }
        
        .prediction-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        
        .confidence-high {
            color: #0f0;
        }
        
        .confidence-medium {
            color: #ff0;
        }
        
        .confidence-low {
            color: #f00;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>⚽ BetIQ Analyzer</h1>
            <p>AI destekli futbol maç analizi ve tahminleri</p>
        </header>

        <!-- CSV Upload Card -->
        <div class="csv-upload-card">
            <h3>📁 CSV ile Maç Ekle</h3>
            <p style="font-size: 12px; margin: 0 0 10px 0; opacity: 0.9;">FootyStats'ten indirdiğiniz CSV dosyasını yükleyerek maçları analiz edin</p>
            <form id="csvUploadForm" enctype="multipart/form-data">
                <input type="file" id="csvFile" accept=".csv" required>
                <button type="submit">CSV Yükle ve Analiz Et</button>
            </form>
            <div id="csvUploadStatus"></div>
        </div>

        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab-button active" data-tab="today">📅 Bugün</button>
            <button class="tab-button" data-tab="history">📊 Geçmiş</button>
            <button class="tab-button" data-tab="stats">📈 İstatistikler</button>
        </div>

        <!-- Today Tab -->
        <div id="today" class="tab-content active">
            <div class="section">
                <h2>Bugünün Maçları</h2>
                <div id="todayMatches" class="matches-list">
                    <p class="loading">Maçlar yükleniyor...</p>
                </div>
            </div>
        </div>

        <!-- History Tab -->
        <div id="history" class="tab-content">
            <div class="section">
                <h2>Geçmiş Analizler</h2>
                <div>
                    <label for="dateSelect">Tarih Seç: </label>
                    <select id="dateSelect">
                        <option value="">Tarihleri yükleniyor...</option>
                    </select>
                </div>
                <div id="historyMatches" class="matches-list" style="margin-top: 20px;">
                    <p class="loading">Lütfen bir tarih seçin</p>
                </div>
            </div>
        </div>

        <!-- Stats Tab -->
        <div id="stats" class="tab-content">
            <div class="section">
                <h2>📈 İstatistikler</h2>
                <div id="statsContent">
                    <p class="loading">İstatistikler yükleniyor...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tab Navigation
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', (e) => {
                const tab = e.target.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.getElementById(tab).classList.add('active');
                document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
                e.target.classList.add('active');
                
                if (tab === 'history') {
                    loadDates();
                } else if (tab === 'stats') {
                    loadStats();
                } else if (tab === 'today') {
                    loadTodayMatches();
                }
            });
        });

        // CSV Upload Handler
        document.getElementById('csvUploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            const statusDiv = document.getElementById('csvUploadStatus');
            
            if (!file) {
                statusDiv.innerHTML = '<p class="error">Dosya seç!</p>';
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            statusDiv.innerHTML = '<p class="loading">⚙️ Yükleniyor ve analiz ediliyor...</p>';
            
            try {
                const response = await fetch('/api/csv/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    statusDiv.innerHTML = `<p class="success">✅ ${data.message}</p>`;
                    fileInput.value = '';
                    
                    // 3 saniye sonra maçları yenile
                    setTimeout(() => {
                        loadTodayMatches();
                    }, 3000);
                } else {
                    statusDiv.innerHTML = `<p class="error">❌ ${data.message}</p>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<p class="error">❌ Hata: ${error.message}</p>`;
            }
        });

        // Load Today's Matches
        async function loadTodayMatches() {
            const container = document.getElementById('todayMatches');
            container.innerHTML = '<p class="loading">Maçlar yükleniyor...</p>';
            
            try {
                const response = await fetch('/api/matches/today');
                const matches = await response.json();
                
                if (!Array.isArray(matches) || matches.length === 0) {
                    container.innerHTML = '<p class="no-data">Bugün için analiz yapılmış maç yok</p>';
                    return;
                }
                
                container.innerHTML = matches.map(m => `
                    <div class="match-card">
                        <div class="match-header">
                            <div>
                                <div class="match-teams">${m.home_team || '?'} vs ${m.away_team || '?'}</div>
                                <div class="match-league">${m.league || ''}</div>
                            </div>
                            <div class="confidence-${m.confidence?.toLowerCase().includes('yüksek') ? 'high' : m.confidence?.toLowerCase().includes('orta') ? 'medium' : 'low'}">
                                ${m.confidence || 'N/A'}
                            </div>
                        </div>
                        <div class="match-prediction">
                            <div class="prediction-item">
                                <div>Tahmin</div>
                                <div class="prediction-value">${m.prediction_1x2 || '?'}</div>
                            </div>
                            <div class="prediction-item">
                                <div>2.5 Üst %</div>
                                <div class="prediction-value">${Math.round(m.over25_pct || 0)}</div>
                            </div>
                            <div class="prediction-item">
                                <div>KG Var %</div>
                                <div class="prediction-value">${Math.round(m.btts_pct || 0)}</div>
                            </div>
                            <div class="prediction-item">
                                <div>İY 0.5 %</div>
                                <div class="prediction-value">${Math.round(m.ht2g_pct || 0)}</div>
                            </div>
                        </div>
                        <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; font-size: 12px; color: #999;">
                            <strong>Skor Tahmini:</strong> ${m.predicted_score || '?-?'}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = `<p class="error">Hata: ${error.message}</p>`;
            }
        }

        // Load Available Dates
        async function loadDates() {
            const select = document.getElementById('dateSelect');
            
            try {
                const response = await fetch('/api/dates');
                const dates = await response.json();
                
                select.innerHTML = '<option value="">Tarih seçin...</option>' + 
                    dates.map(d => `<option value="${d}">${d}</option>`).join('');
                
                select.addEventListener('change', (e) => {
                    if (e.target.value) {
                        loadHistoryMatches(e.target.value);
                    }
                });
            } catch (error) {
                select.innerHTML = '<option>Tarihler yüklenemedi</option>';
            }
        }

        // Load History Matches by Date
        async function loadHistoryMatches(date) {
            const container = document.getElementById('historyMatches');
            container.innerHTML = '<p class="loading">Maçlar yükleniyor...</p>';
            
            try {
                const response = await fetch(`/api/matches/date/${date}`);
                const matches = await response.json();
                
                if (!Array.isArray(matches) || matches.length === 0) {
                    container.innerHTML = '<p class="no-data">Bu tarihte analiz yok</p>';
                    return;
                }
                
                container.innerHTML = matches.map(m => `
                    <div class="match-card">
                        <div class="match-header">
                            <div>
                                <div class="match-teams">
                                    ${m.home_team || '?'} 
                                    <span style="color: #667eea; font-weight: bold;">
                                        ${m.home_score !== null ? m.home_score : '?'}
                                    </span>
                                    - 
                                    <span style="color: #667eea; font-weight: bold;">
                                        ${m.away_score !== null ? m.away_score : '?'}
                                    </span>
                                    ${m.away_team || '?'}
                                </div>
                                <div class="match-league">${m.league || ''}</div>
                            </div>
                        </div>
                        <div class="match-prediction">
                            <div class="prediction-item">
                                <div>Tahmin</div>
                                <div class="prediction-value">${m.prediction_1x2 || '?'}</div>
                            </div>
                            <div class="prediction-item">
                                <div>1X2 ${m.pred_1x2_correct ? '✅' : '❌'}</div>
                                <div style="font-size: 10px; color: #999;">${m.actual_1x2 || '-'}</div>
                            </div>
                            <div class="prediction-item">
                                <div>2.5 ${m.over25_correct ? '✅' : '❌'}</div>
                                <div style="font-size: 10px; color: #999;">${m.total_goals || '-'} gol</div>
                            </div>
                            <div class="prediction-item">
                                <div>KG ${m.btts_correct ? '✅' : '❌'}</div>
                                <div style="font-size: 10px; color: #999;">${m.actual_btts ? 'Var' : 'Yok'}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = `<p class="error">Hata: ${error.message}</p>`;
            }
        }

        // Load Stats
        async function loadStats() {
            const container = document.getElementById('statsContent');
            container.innerHTML = '<p class="loading">İstatistikler yükleniyor...</p>';
            
            try {
                const [overview, daily, category, league, confidence] = await Promise.all([
                    fetch('/api/stats/overview').then(r => r.json()),
                    fetch('/api/stats/daily').then(r => r.json()),
                    fetch('/api/stats/by-category').then(r => r.json()),
                    fetch('/api/stats/by-league').then(r => r.json()),
                    fetch('/api/stats/by-confidence').then(r => r.json())
                ]);
                
                container.innerHTML = `
                    <div style="background: #0f0f1e; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <h3>Genel İstatistikler (Tüm Zamanlar)</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
                            <div style="background: #1a1a2e; padding: 15px; border-radius: 5px; border-left: 4px solid #667eea;">
                                <div style="color: #999; font-size: 12px;">Toplam Maç</div>
                                <div style="font-size: 24px; font-weight: bold; color: white;">${overview.total || 0}</div>
                            </div>
                            <div style="background: #1a1a2e; padding: 15px; border-radius: 5px; border-left: 4px solid #0f0;">
                                <div style="color: #999; font-size: 12px;">1X2 Başarı</div>
                                <div style="font-size: 24px; font-weight: bold; color: #0f0;">${overview['1x2'].pct}%</div>
                                <div style="font-size: 10px; color: #666;">${overview['1x2'].correct}/${overview.total}</div>
                            </div>
                            <div style="background: #1a1a2e; padding: 15px; border-radius: 5px; border-left: 4px solid #ffff00;">
                                <div style="color: #999; font-size: 12px;">2.5 Üst Başarı</div>
                                <div style="font-size: 24px; font-weight: bold; color: #ffff00;">${overview.over25.pct}%</div>
                                <div style="font-size: 10px; color: #666;">${overview.over25.correct}/${overview.total}</div>
                            </div>
                            <div style="background: #1a1a2e; padding: 15px; border-radius: 5px; border-left: 4px solid #ff6b9d;">
                                <div style="color: #999; font-size: 12px;">KG Var Başarı</div>
                                <div style="font-size: 24px; font-weight: bold; color: #ff6b9d;">${overview.btts.pct}%</div>
                                <div style="font-size: 10px; color: #666;">${overview.btts.correct}/${overview.total}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="background: #0f0f1e; padding: 20px; border-radius: 10px;">
                        <h3>Kategori Bazında Başarı</h3>
                        <table style="width: 100%; color: #ddd; font-size: 12px;">
                            <tr style="border-bottom: 1px solid #333;">
                                <th style="text-align: left; padding: 10px;">Kategori</th>
                                <th style="text-align: center; padding: 10px;">Doğru</th>
                                <th style="text-align: center; padding: 10px;">Toplam</th>
                                <th style="text-align: center; padding: 10px;">Başarı %</th>
                            </tr>
                            ${category.map(c => `
                                <tr style="border-bottom: 1px solid #222;">
                                    <td style="padding: 10px;">${c.name}</td>
                                    <td style="text-align: center; padding: 10px;">${c.correct}</td>
                                    <td style="text-align: center; padding: 10px;">${c.total}</td>
                                    <td style="text-align: center; padding: 10px; color: ${c.pct >= 60 ? '#0f0' : c.pct >= 50 ? '#ffff00' : '#f00'}; font-weight: bold;">
                                        ${c.pct}%
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<p class="error">Hata: ${error.message}</p>`;
            }
        }

        // Load today's matches on page load
        window.addEventListener('load', loadTodayMatches);
    </script>
</body>
</html>
