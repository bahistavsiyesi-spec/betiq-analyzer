<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günün Özeti — GOLLAZIM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .ozet-container { max-width: 860px; margin: 0 auto; padding: 24px; }

        .ozet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #1e1e3a;
        }
        .ozet-header h1 { font-size: 20px; font-weight: 800; color: #fff; }

        .ai-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }
        .ai-selector span { font-size: 11px; color: #555; margin-right: 4px; }
        .ai-btn-oz {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            background: transparent;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .ai-btn-oz.active-claude { background: rgba(124,58,237,0.15); color: #a78bfa; border-color: #7c3aed; }
        .ai-btn-oz.active-grok  { background: rgba(16,185,129,0.15); color: #10b981; border-color: #10b981; }
        .ai-btn-oz.active-gemini{ background: rgba(59,130,246,0.15); color: #3b82f6; border-color: #3b82f6; }

        .action-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn-generate {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-telegram-oz {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-telegram-oz:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Tarih navigasyonu */
        .date-picker-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #0d0d1a;
            border: 1px solid #1e1e3a;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        .date-picker-row label { font-size: 11px; color: #555; font-weight: 700; letter-spacing: 0.5px; }
        .date-nav { display: flex; gap: 6px; align-items: center; }
        .btn-nav {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #1e1e3a;
            background: transparent;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-nav:hover:not(:disabled) { border-color: #7c3aed; color: #a78bfa; }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
        .current-date-label {
            font-size: 13px; font-weight: 700; color: #a78bfa;
            min-width: 120px; text-align: center;
        }
        .date-input {
            padding: 6px 12px;
            background: #12121f;
            border: 1px solid #1e1e3a;
            border-radius: 8px;
            color: #ddd;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
        }
        .date-input:focus { outline: none; border-color: #7c3aed; }

        /* Özet kutusu */
        .summary-box {
            background: #0d0d1a;
            border: 1px solid #1e1e3a;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 24px;
            min-height: 120px;
        }
        .summary-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1e1e3a;
        }
        .ai-tag {
            font-size: 10px; font-weight: 700; color: #a78bfa;
            background: rgba(124,58,237,0.12);
            border: 1px solid rgba(124,58,237,0.25);
            padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px;
        }
        .created-tag { font-size: 10px; color: #444; }

        /* Markdown stilleri */
        .summary-content { font-size: 13px; color: #bbb; line-height: 1.8; }
        .md-h1 {
            font-size: 15px; font-weight: 800; color: #fff;
            margin: 4px 0 16px; padding-bottom: 8px;
            border-bottom: 1px solid #1e1e3a;
        }
        .md-h2 {
            font-size: 13px; font-weight: 700; color: #a78bfa;
            margin: 20px 0 8px; letter-spacing: 0.3px;
        }
        .md-bullet {
            display: flex; gap: 8px; margin-bottom: 6px;
            align-items: flex-start; padding-left: 4px;
        }
        .md-bullet .dot { color: #7c3aed; flex-shrink: 0; margin-top: 2px; }
        .md-bold { color: #fff; font-weight: 700; }
        .md-p { margin-bottom: 6px; color: #888; font-style: italic; }
        .md-space { height: 6px; }

        /* Highlights Kartları */
        .highlights-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .hl-card {
            background: #0d0d1a;
            border: 1px solid #1e1e3a;
            border-radius: 14px;
            padding: 16px;
        }
        .hl-card.vb-card  { border-color: rgba(34,197,94,0.3); }
        .hl-card.sp-card  { border-color: rgba(124,58,237,0.3); }
        .hl-card.risk-card { border-color: rgba(245,158,11,0.3); }
        .hl-title {
            font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
        }
        .hl-title.green  { color: #22c55e; }
        .hl-title.purple { color: #a78bfa; }
        .hl-title.yellow { color: #f59e0b; }
        .hl-teams { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .hl-league { font-size: 10px; color: #444; margin-bottom: 8px; }
        .hl-metric { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #666; padding: 4px 0; border-top: 1px solid #111; }
        .hl-metric span { font-weight: 700; }
        .hl-metric .green  { color: #22c55e; }
        .hl-metric .purple { color: #a78bfa; }
        .hl-metric .yellow { color: #f59e0b; }
        .hl-empty { font-size: 11px; color: #333; text-align: center; padding: 12px 0; }
        .risk-item { font-size: 11px; color: #f59e0b; padding: 3px 0; border-top: 1px solid #111; display: flex; gap: 6px; }
        .risk-teams { font-size: 11px; font-weight: 700; color: #ddd; }
        .btn-hl-telegram {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: rgba(37,99,235,0.15);
            border: 1px solid rgba(37,99,235,0.4);
            color: #60a5fa;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-hl-telegram:hover { background: rgba(37,99,235,0.25); }
        .btn-hl-telegram:disabled { opacity: 0.4; cursor: not-allowed; }

        .empty-state {
            text-align: center; padding: 40px 20px;
            color: #333; font-size: 13px;
        }
        .loading-state {
            display: flex; align-items: center; gap: 12px;
            padding: 20px; color: #555; font-size: 13px;
        }
        .spinner-sm {
            width: 18px; height: 18px;
            border: 2px solid #1e1e3a;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite; flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Geçmiş */
        .history-section { margin-top: 32px; }
        .history-section h2 { font-size: 11px; font-weight: 700; color: #555; margin-bottom: 12px; letter-spacing: 0.5px; }
        .history-list { display: flex; flex-direction: column; gap: 6px; }
        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; background: #0d0d1a;
            border: 1px solid #1e1e3a; border-radius: 10px;
            cursor: pointer; transition: border-color 0.2s;
        }
        .history-item:hover { border-color: #7c3aed44; }
        .history-item.active { border-color: #7c3aed; background: #12121f; }
        .h-date { font-size: 13px; font-weight: 700; color: #ddd; }
        .h-ai { font-size: 10px; color: #666; background: #1a1a2e; padding: 2px 8px; border-radius: 10px; }
        .h-time { font-size: 10px; color: #333; }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <img src="/static/img/logo.png" style="height:32px;object-fit:contain;" onerror="this.style.display='none'">
                <div>
                    <div class="logo-text">GOLLAZIM</div>
                    <div class="logo-sub">AI ANALYSIS</div>
                </div>
            </div>
            <nav style="display:flex;gap:6px;margin-left:auto;">
                <a href="/" style="padding:6px 12px;border-radius:8px;border:1px solid #1e1e3a;background:transparent;color:#666;font-size:12px;text-decoration:none;font-family:inherit;">Ana Sayfa</a>
                <a href="/gecmis" style="padding:6px 12px;border-radius:8px;border:1px solid #1e1e3a;background:transparent;color:#666;font-size:12px;text-decoration:none;font-family:inherit;">Geçmiş</a>
                <a href="/gunun-ozeti" style="padding:6px 12px;border-radius:8px;border:1px solid #7c3aed;background:rgba(124,58,237,0.12);color:#a78bfa;font-size:12px;text-decoration:none;font-family:inherit;">Günün Özeti</a>
                <a href="/istatistik" style="padding:6px 12px;border-radius:8px;border:1px solid #1e1e3a;background:transparent;color:#666;font-size:12px;text-decoration:none;font-family:inherit;">İstatistik</a>
                <a href="/kuponlar" style="padding:6px 12px;border-radius:8px;border:1px solid #1e1e3a;background:transparent;color:#666;font-size:12px;text-decoration:none;font-family:inherit;">Kuponlar</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="ozet-container">
            <div class="ozet-header">
                <h1>📋 Günün Özeti</h1>
            </div>

            <!-- Tarih Navigasyonu -->
            <div class="date-picker-row">
                <label>📅 TARİH</label>
                <div class="date-nav">
                    <button class="btn-nav" id="prevBtn" onclick="navigateDate(-1)">← Önceki</button>
                    <span class="current-date-label" id="currentDateLabel">—</span>
                    <button class="btn-nav" id="nextBtn" onclick="navigateDate(1)">Sonraki →</button>
                </div>
                <input type="date" class="date-input" id="datePicker" onchange="onDatePickerChange()">
            </div>

            <!-- AI Seçimi -->
            <div class="ai-selector">
                <span>🤖 AI:</span>
                <button class="ai-btn-oz active-claude" id="oz-claude" onclick="selectAi('claude')">Claude</button>
                <button class="ai-btn-oz" id="oz-grok" onclick="selectAi('grok')">Grok</button>
                <button class="ai-btn-oz" id="oz-gemini" onclick="selectAi('gemini')">Gemini</button>
            </div>

            <!-- Aksiyon Butonları -->
            <div class="action-row">
                <button class="btn-generate" id="generateBtn" onclick="generateSummary()">
                    🤖 Genel Değerlendirme Yap
                </button>
                <button class="btn-telegram-oz" id="telegramOzBtn" onclick="sendSummaryToTelegram()" style="display:none;">
                    📨 Telegram'a Gönder
                </button>
                <button class="btn-telegram-oz" id="downloadOzBtn" onclick="downloadSummary()"
                    style="display:none;background:#7c3aed;">
                    📸 PNG İndir
                </button>
                <button class="btn-hl-telegram" id="hlTelegramBtn" onclick="sendHighlightsToTelegram()" style="display:none;">
                    📊 Öne Çıkanları Telegram'a Gönder
                </button>
            </div>

            <!-- Yapısal Öne Çıkanlar -->
            <div id="highlightsSection" style="display:none;">
                <div style="font-size:11px;font-weight:700;color:#555;letter-spacing:0.5px;margin-bottom:10px;">📌 GÜNÜN ÖNE ÇIKANLARI</div>
                <div class="highlights-row" id="highlightsRow"></div>
            </div>

            <!-- Özet Kutusu -->
            <div class="summary-box" id="summaryBox">
                <div class="empty-state">
                    📭 Bu tarihe ait özet yok.<br>
                    <small style="color:#2a2a3a;">Analizler yapıldıktan sonra "Genel Değerlendirme Yap" butonuna bas.</small>
                </div>
            </div>

            <!-- Geçmiş Özetler -->
            <div class="history-section">
                <h2>📅 GEÇMİŞ ÖZETLER</h2>
                <div class="history-list" id="historyList">
                    <div style="color:#333;font-size:12px;padding:12px;">Yükleniyor...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
let selectedAi = 'claude';
let currentSummary = null;
let currentDate = (function(){ const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; })();
let currentHighlights = null;

// ── Markdown Render ────────────────────────────────────────────────────────────
function renderMarkdown(text) {
    const categoryEmojis = [
        [/güvenilir|güvenli/i,    '🏆'],
        [/golcü|gol beklent/i,    '⚽'],
        [/karşılıklı|kg var|btts/i,'🔁'],
        [/korner/i,               '🚩'],
        [/ikinci yarı|2\. yarı/i, '⏱️'],
        [/risk/i,                 '⚠️'],
        [/genel|özet/i,           '📊'],
    ];

    function addEmoji(title) {
        for (const [re, emoji] of categoryEmojis) {
            if (re.test(title)) return emoji + ' ';
        }
        return '';
    }

    function parseBold(str) {
        return str.replace(/\*\*(.+?)\*\*/g, '<span class="md-bold">$1</span>');
    }

    let html = '';
    for (let line of text.split('\n')) {
        line = line.trim();
        if (!line) { html += '<div class="md-space"></div>'; continue; }

        if (/^#{1,2}\s/.test(line)) {
            const t = line.replace(/^#+\s/, '');
            html += `<div class="md-h1">${addEmoji(t)}${parseBold(t)}</div>`;
        } else if (/^###\s/.test(line)) {
            const t = line.replace(/^###\s/, '');
            html += `<div class="md-h2">${addEmoji(t)}${parseBold(t)}</div>`;
        } else if (/^\d+\.\s/.test(line)) {
            const t = line.replace(/^\d+\.\s/, '');
            html += `<div class="md-h2">${addEmoji(t)}${parseBold(t)}</div>`;
        } else if (/^[-•*]\s/.test(line)) {
            const t = line.replace(/^[-•*]\s/, '');
            html += `<div class="md-bullet"><span class="dot">▸</span><span>${parseBold(t)}</span></div>`;
        } else {
            html += `<div class="md-p">${parseBold(line)}</div>`;
        }
    }
    return html;
}

// ── Tarih ─────────────────────────────────────────────────────────────────────
function formatDateTR(dateStr) {
    if (!dateStr) return '—';
    try {
        const [y, m, d] = dateStr.split('-');
        const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
        return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
    } catch { return dateStr; }
}

function updateDateUI() {
    document.getElementById('currentDateLabel').textContent = formatDateTR(currentDate);
    document.getElementById('datePicker').value = currentDate;
    const today = localDateStr(new Date());
    document.getElementById('nextBtn').disabled = currentDate >= today;
}

function localDateStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

function navigateDate(dir) {
    const [y, mo, da] = currentDate.split('-').map(Number);
    const d = new Date(y, mo - 1, da);
    d.setDate(d.getDate() + dir);
    const today = new Date(); today.setHours(0, 0, 0, 0);
    if (d > today) return;
    currentDate = localDateStr(d);
    updateDateUI();
    loadSummaryForDate(currentDate);
    loadHighlights(currentDate);
}

function onDatePickerChange() {
    const val = document.getElementById('datePicker').value;
    if (!val) return;
    const today = localDateStr(new Date());
    if (val > today) return;
    currentDate = val;
    updateDateUI();
    loadSummaryForDate(currentDate);
    loadHighlights(currentDate);
}

// ── AI Seçimi ─────────────────────────────────────────────────────────────────
function selectAi(provider) {
    selectedAi = provider;
    document.querySelectorAll('.ai-btn-oz').forEach(b => b.className = 'ai-btn-oz');
    document.getElementById('oz-' + provider)?.classList.add('active-' + provider);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSummary(content, aiProvider, createdAt) {
    const aiLabel = aiProvider === 'grok' ? '⚡ Grok' : aiProvider === 'gemini' ? '✨ Gemini' : '🤖 Claude';
    const timeStr = createdAt ? (createdAt.split(' ')[1] || '') : '';
    document.getElementById('summaryBox').innerHTML = `
        <div class="summary-meta">
            <span class="ai-tag">${aiLabel}</span>
            <span class="created-tag">${formatDateTR(currentDate)} · ${timeStr}</span>
        </div>
        <div class="summary-content">${renderMarkdown(content)}</div>
    `;
    document.getElementById('telegramOzBtn').style.display = '';
    document.getElementById('downloadOzBtn').style.display = '';
}

// ── Highlights ────────────────────────────────────────────────────────────────
async function loadHighlights(dateStr) {
    try {
        const resp = await fetch(`/api/summary/highlights/${dateStr}`);
        const d = await resp.json();
        if (d.error || d.total_matches === 0) {
            document.getElementById('highlightsSection').style.display = 'none';
            document.getElementById('hlTelegramBtn').style.display = 'none';
            currentHighlights = null;
            return;
        }
        currentHighlights = d;
        renderHighlights(d);
        document.getElementById('highlightsSection').style.display = '';
        document.getElementById('hlTelegramBtn').style.display = '';
    } catch(e) {
        console.error('Highlights yüklenemedi:', e);
    }
}

function renderHighlights(d) {
    const row = document.getElementById('highlightsRow');
    let html = '';

    // En iyi value bet
    const vb = d.best_value_bet;
    if (vb) {
        html += `<div class="hl-card vb-card">
            <div class="hl-title green">💎 EN İYİ VALUE BET</div>
            <div class="hl-teams">${vb.home_team} vs ${vb.away_team}</div>
            <div class="hl-league">${vb.league || ''}${vb.match_time ? ' · ' + vb.match_time : ''}</div>
            <div class="hl-metric">Bahis <span class="green">${vb.label}</span></div>
            <div class="hl-metric">Oran <span class="green">${vb.odds ?? '—'}</span></div>
            <div class="hl-metric">Bizim % <span class="green">%${vb.our_pct ?? '?'}</span></div>
            <div class="hl-metric">Bahisçi % <span>${vb.implied_pct ?? '?'}%</span></div>
            <div class="hl-metric">Edge <span class="green">+%${vb.diff}</span></div>
        </div>`;
    } else {
        html += `<div class="hl-card vb-card"><div class="hl-title green">💎 EN İYİ VALUE BET</div><div class="hl-empty">Bugün value bet yok</div></div>`;
    }

    // En güvenli pick
    const sp = d.safest_pick;
    if (sp) {
        html += `<div class="hl-card sp-card">
            <div class="hl-title purple">🏆 EN GÜVENLİ PİCK</div>
            <div class="hl-teams">${sp.home_team} vs ${sp.away_team}</div>
            <div class="hl-league">${sp.league || ''}${sp.match_time ? ' · ' + sp.match_time : ''}</div>
            <div class="hl-metric">Tahmin <span class="purple">${sp.prediction}</span></div>
            <div class="hl-metric">Güven <span class="purple">${sp.confidence}</span></div>
            ${sp.odds ? `<div class="hl-metric">Oran <span class="purple">${sp.odds}</span></div>` : ''}
            ${sp.over25_pct ? `<div class="hl-metric">Over 2.5 <span>%${Math.round(sp.over25_pct)}</span></div>` : ''}
        </div>`;
    } else {
        html += `<div class="hl-card sp-card"><div class="hl-title purple">🏆 EN GÜVENLİ PİCK</div><div class="hl-empty">Yüksek güvenli tahmin yok</div></div>`;
    }

    // Risk uyarıları
    const risks = d.risk_alerts || [];
    if (risks.length > 0) {
        const riskItems = risks.map(r => `
            <div style="margin-bottom:8px;">
                <div class="risk-teams">${r.home_team} vs ${r.away_team}</div>
                ${r.reasons.map(rs => `<div class="risk-item"><span>⚠️</span><span>${rs}</span></div>`).join('')}
            </div>`).join('');
        html += `<div class="hl-card risk-card">
            <div class="hl-title yellow">⚠️ RİSK UYARILARI (${risks.length})</div>
            ${riskItems}
        </div>`;
    }

    row.innerHTML = html;
}

async function sendHighlightsToTelegram() {
    if (!currentHighlights) return;
    const btn = document.getElementById('hlTelegramBtn');
    btn.disabled = true; btn.textContent = '⏳ Gönderiliyor...';
    try {
        const resp = await fetch('/api/summary/highlights/telegram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date: currentDate, highlights: currentHighlights })
        });
        const data = await resp.json();
        if (data.status === 'success') {
            btn.textContent = '✅ Gönderildi!';
            setTimeout(() => { btn.textContent = '📊 Öne Çıkanları Telegram\'a Gönder'; btn.disabled = false; }, 3000);
        } else {
            alert('Hata: ' + data.message);
            btn.disabled = false; btn.textContent = '📊 Öne Çıkanları Telegram\'a Gönder';
        }
    } catch(e) {
        alert('Hata: ' + e.message);
        btn.disabled = false; btn.textContent = '📊 Öne Çıkanları Telegram\'a Gönder';
    }
}

// ── Yükle ─────────────────────────────────────────────────────────────────────
async function loadSummaryForDate(dateStr) {
    const box = document.getElementById('summaryBox');
    box.innerHTML = '<div class="loading-state"><div class="spinner-sm"></div><span>Yükleniyor...</span></div>';
    document.getElementById('telegramOzBtn').style.display = 'none';
    document.getElementById('downloadOzBtn').style.display = 'none';
    currentSummary = null;

    try {
        const resp = await fetch(`/api/summary/date/${dateStr}`);
        const data = await resp.json();
        if (data && data.content) {
            currentSummary = data.content;
            renderSummary(data.content, data.ai_provider, data.created_at);
        } else {
            box.innerHTML = `<div class="empty-state">📭 ${formatDateTR(dateStr)} tarihine ait özet yok.<br><small style="color:#2a2a3a;">Analizler yapıldıktan sonra "Genel Değerlendirme Yap" butonuna bas.</small></div>`;
        }
    } catch(e) {
        box.innerHTML = `<div class="empty-state">❌ Hata: ${e.message}</div>`;
    }

    document.querySelectorAll('.history-item').forEach(el => {
        el.classList.toggle('active', el.dataset.date === dateStr);
    });
}

// ── Üret ──────────────────────────────────────────────────────────────────────
async function generateSummary() {
    const btn = document.getElementById('generateBtn');
    const box = document.getElementById('summaryBox');
    btn.disabled = true;
    btn.textContent = '⏳ Değerlendirme yapılıyor...';
    box.innerHTML = '<div class="loading-state"><div class="spinner-sm"></div><span>AI analiz yapıyor, lütfen bekle...</span></div>';

    try {
        const resp = await fetch('/api/summary/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ai_provider: selectedAi })
        });
        const data = await resp.json();
        if (data.status === 'success') {
            currentSummary = data.content;
            currentDate = localDateStr(new Date());
            updateDateUI();
            renderSummary(data.content, data.ai_provider, data.created_at);
            await loadHistory();
        } else {
            box.innerHTML = `<div class="empty-state">❌ ${data.message}</div>`;
        }
    } catch(e) {
        box.innerHTML = `<div class="empty-state">❌ Hata: ${e.message}</div>`;
    }
    btn.disabled = false;
    btn.textContent = '🤖 Genel Değerlendirme Yap';
}

// ── Geçmiş ────────────────────────────────────────────────────────────────────
async function loadHistory() {
    try {
        const resp = await fetch('/api/summary/list');
        const data = await resp.json();
        const container = document.getElementById('historyList');
        if (!data || data.length === 0) {
            container.innerHTML = '<div style="color:#333;font-size:12px;padding:12px;">Henüz kayıtlı özet yok.</div>';
            return;
        }
        container.innerHTML = data.map(s => {
            const aiLabel = s.ai_provider === 'grok' ? '⚡ Grok' : s.ai_provider === 'gemini' ? '✨ Gemini' : '🤖 Claude';
            const timeStr = (s.created_at || '').split(' ')[1] || '';
            return `<div class="history-item ${s.summary_date === currentDate ? 'active' : ''}"
                        data-date="${s.summary_date}"
                        onclick="selectHistory('${s.summary_date}')">
                <span class="h-date">📅 ${formatDateTR(s.summary_date)}</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="h-ai">${aiLabel}</span>
                    <span class="h-time">${timeStr}</span>
                </div>
            </div>`;
        }).join('');
    } catch(e) { console.error('History load failed:', e); }
}

function selectHistory(dateStr) {
    currentDate = dateStr;
    updateDateUI();
    loadSummaryForDate(dateStr);
    loadHighlights(dateStr);
}

// ── İndir ─────────────────────────────────────────────────────────────────────
async function downloadSummary() {
    const box = document.getElementById('summaryBox');
    const btn = document.getElementById('downloadOzBtn');
    btn.disabled = true; btn.textContent = '⏳ Hazırlanıyor...';
    const meta = box.querySelector('.summary-meta');
    if (meta) meta.style.display = 'none';
    try {
        const canvas = await html2canvas(box, {
            scale: 3,
            backgroundColor: '#0d0d1a',
            useCORS: true,
            logging: false
        });
        const link = document.createElement('a');
        link.download = `gollazim_ozet_${currentDate}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    } catch(e) {
        alert('İndirme hatası: ' + e.message);
    }
    if (meta) meta.style.display = '';
    btn.disabled = false; btn.textContent = '📸 PNG İndir';
}

// ── Telegram (görsel olarak) ──────────────────────────────────────────────────
async function sendSummaryToTelegram() {
    if (!currentSummary) return;
    const btn = document.getElementById('telegramOzBtn');
    const box = document.getElementById('summaryBox');
    btn.disabled = true; btn.textContent = '⏳ Gönderiliyor...';
    const meta = box.querySelector('.summary-meta');
    if (meta) meta.style.display = 'none';
    try {
        const canvas = await html2canvas(box, {
            scale: 2,
            backgroundColor: '#0d0d1a',
            useCORS: true,
            logging: false
        });
        const base64 = canvas.toDataURL('image/png').split(',')[1];
        const caption = `📋 <b>Günün Özeti — ${formatDateTR(currentDate)}</b>\n📊 GOLLAZIM Analiz`;
        const resp = await fetch('/api/telegram/send-card', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64, caption })
        });
        const data = await resp.json();
        if (data.status === 'success') {
            btn.textContent = '✅ Gönderildi!'; btn.style.background = '#22c55e';
            setTimeout(() => { btn.textContent = "📨 Telegram'a Gönder"; btn.style.background = ''; btn.disabled = false; }, 3000);
        } else {
            alert('Hata: ' + data.message); btn.disabled = false; btn.textContent = "📨 Telegram'a Gönder";
        }
    } catch(e) {
        alert('Hata: ' + e.message); btn.disabled = false; btn.textContent = "📨 Telegram'a Gönder";
    }
    if (meta) meta.style.display = '';
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    updateDateUI();
    await Promise.all([
        loadSummaryForDate(currentDate),
        loadHighlights(currentDate),
    ]);
    await loadHistory();
});
</script>
</body>
</html>
