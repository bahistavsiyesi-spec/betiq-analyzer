<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günün Özeti — GOLLAZIM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .ozet-container { max-width: 860px; margin: 0 auto; padding: 24px; }

        .ozet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #1e1e3a;
        }
        .ozet-header h1 { font-size: 20px; font-weight: 800; color: #fff; }
        .ozet-header .date-badge {
            font-size: 12px; color: #555;
            background: #12121f; border: 1px solid #1e1e3a;
            padding: 4px 12px; border-radius: 20px;
        }

        .ai-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }
        .ai-selector span { font-size: 11px; color: #555; margin-right: 4px; }
        .ai-btn-oz {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            background: transparent;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .ai-btn-oz.active-claude { background: rgba(124,58,237,0.15); color: #a78bfa; border-color: #7c3aed; }
        .ai-btn-oz.active-grok  { background: rgba(16,185,129,0.15); color: #10b981; border-color: #10b981; }
        .ai-btn-oz.active-gemini{ background: rgba(59,130,246,0.15); color: #3b82f6; border-color: #3b82f6; }

        .action-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .btn-generate {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-telegram-oz {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .btn-telegram-oz:disabled { opacity: 0.4; cursor: not-allowed; }

        .summary-box {
            background: #0d0d1a;
            border: 1px solid #1e1e3a;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 24px;
            min-height: 120px;
        }
        .summary-box .summary-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1e1e3a;
        }
        .summary-box .summary-meta .ai-tag {
            font-size: 10px;
            font-weight: 700;
            color: #a78bfa;
            background: rgba(124,58,237,0.12);
            border: 1px solid rgba(124,58,237,0.25);
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .summary-box .summary-meta .created-tag {
            font-size: 10px;
            color: #444;
        }
        .summary-content {
            font-size: 13px;
            color: #bbb;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .summary-content .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #7c3aed;
            letter-spacing: 0.5px;
            margin-top: 12px;
            margin-bottom: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #333;
            font-size: 13px;
        }
        .loading-state {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            color: #555;
            font-size: 13px;
        }
        .spinner-sm {
            width: 18px; height: 18px;
            border: 2px solid #1e1e3a;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Geçmiş özet listesi */
        .history-section { margin-top: 32px; }
        .history-section h2 {
            font-size: 13px;
            font-weight: 700;
            color: #555;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .history-list { display: flex; flex-direction: column; gap: 6px; }
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #0d0d1a;
            border: 1px solid #1e1e3a;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .history-item:hover { border-color: #7c3aed44; }
        .history-item.active { border-color: #7c3aed; background: #12121f; }
        .history-item .h-date { font-size: 13px; font-weight: 700; color: #ddd; }
        .history-item .h-ai {
            font-size: 10px; color: #666;
            background: #1a1a2e; padding: 2px 8px; border-radius: 10px;
        }
        .history-item .h-time { font-size: 10px; color: #333; }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <img src="/static/img/logo.png" style="height:32px;object-fit:contain;" onerror="this.style.display='none'">
                <div>
                    <div class="logo-text">GOLLAZIM</div>
                    <div class="logo-sub">AI ANALYSIS</div>
                </div>
            </div>
            <nav style="display:flex;gap:6px;margin-left:auto;">
                <a href="/" style="padding:6px 12px;border-radius:8px;border:1px solid #1e1e3a;background:transparent;color:#666;font-size:12px;text-decoration:none;font-family:inherit;">Ana Sayfa</a>
                <a href="/gecmis" style="padding:6px 12px;border-radius:8px;border:1px solid #1e1e3a;background:transparent;color:#666;font-size:12px;text-decoration:none;font-family:inherit;">Geçmiş</a>
                <a href="/gunun-ozeti" style="padding:6px 12px;border-radius:8px;border:1px solid #7c3aed;background:rgba(124,58,237,0.12);color:#a78bfa;font-size:12px;text-decoration:none;font-family:inherit;">Günün Özeti</a>
                <a href="/istatistik" style="padding:6px 12px;border-radius:8px;border:1px solid #1e1e3a;background:transparent;color:#666;font-size:12px;text-decoration:none;font-family:inherit;">İstatistik</a>
                <a href="/kuponlar" style="padding:6px 12px;border-radius:8px;border:1px solid #1e1e3a;background:transparent;color:#666;font-size:12px;text-decoration:none;font-family:inherit;">Kuponlar</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="ozet-container">
            <div class="ozet-header">
                <h1>📋 Günün Özeti</h1>
                <span class="date-badge" id="todayBadge">—</span>
            </div>

            <!-- AI Seçimi -->
            <div class="ai-selector">
                <span>AI:</span>
                <button class="ai-btn-oz active-claude" id="oz-claude" onclick="selectAi('claude')">Claude</button>
                <button class="ai-btn-oz" id="oz-grok" onclick="selectAi('grok')">Grok</button>
                <button class="ai-btn-oz" id="oz-gemini" onclick="selectAi('gemini')">Gemini</button>
            </div>

            <!-- Aksiyon Butonları -->
            <div class="action-row">
                <button class="btn-generate" id="generateBtn" onclick="generateSummary()">
                    🤖 Genel Değerlendirme Yap
                </button>
                <button class="btn-telegram-oz" id="telegramOzBtn" onclick="sendSummaryToTelegram()" style="display:none;">
                    📨 Telegram'a Gönder
                </button>
            </div>

            <!-- Özet Kutusu -->
            <div class="summary-box" id="summaryBox">
                <div class="empty-state">
                    📭 Henüz özet yok.<br>
                    <small style="color:#2a2a3a;">Bugünün analizleri yapıldıktan sonra "Genel Değerlendirme Yap" butonuna bas.</small>
                </div>
            </div>

            <!-- Geçmiş Özetler -->
            <div class="history-section">
                <h2>📅 GEÇMİŞ ÖZETLER</h2>
                <div class="history-list" id="historyList">
                    <div style="color:#333;font-size:12px;padding:12px;">Yükleniyor...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
let selectedAi = 'claude';
let currentSummary = null;

function selectAi(provider) {
    selectedAi = provider;
    document.querySelectorAll('.ai-btn-oz').forEach(b => {
        b.className = 'ai-btn-oz';
    });
    const el = document.getElementById('oz-' + provider);
    if (el) el.classList.add('active-' + provider);
}

function formatDate(dateStr) {
    if (!dateStr) return '—';
    try {
        const [y, m, d] = dateStr.split('-');
        return `${d}.${m}.${y}`;
    } catch { return dateStr; }
}

async function generateSummary() {
    const btn = document.getElementById('generateBtn');
    const box = document.getElementById('summaryBox');
    btn.disabled = true;
    btn.textContent = '⏳ Değerlendirme yapılıyor...';
    box.innerHTML = '<div class="loading-state"><div class="spinner-sm"></div><span>AI analiz yapıyor, lütfen bekle...</span></div>';

    try {
        const resp = await fetch('/api/summary/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ai_provider: selectedAi })
        });
        const data = await resp.json();
        if (data.status === 'success') {
            currentSummary = data.content;
            renderSummary(data.content, data.ai_provider, data.created_at);
            document.getElementById('telegramOzBtn').style.display = '';
            await loadHistory();
        } else {
            box.innerHTML = `<div class="empty-state">❌ Hata: ${data.message}</div>`;
        }
    } catch(e) {
        box.innerHTML = `<div class="empty-state">❌ Hata: ${e.message}</div>`;
    }
    btn.disabled = false;
    btn.textContent = '🤖 Genel Değerlendirme Yap';
}

function renderSummary(content, aiProvider, createdAt) {
    const box = document.getElementById('summaryBox');
    const aiLabel = aiProvider === 'grok' ? 'Grok' : aiProvider === 'gemini' ? 'Gemini' : 'Claude';
    const timeStr = createdAt ? createdAt.split(' ')[1] || '' : '';

    // İçeriği formatla — numaralı maddeleri renklendir
    const formatted = content
        .replace(/^(\d+\.\s.+)$/gm, '<span style="color:#a78bfa;font-weight:700;">$1</span>')
        .replace(/^(#+\s.+)$/gm, '<span style="color:#7c3aed;font-weight:700;">$1</span>');

    box.innerHTML = `
        <div class="summary-meta">
            <span class="ai-tag">🤖 ${aiLabel}</span>
            <span class="created-tag">${timeStr}</span>
        </div>
        <div class="summary-content">${formatted}</div>
    `;
}

async function loadHistory() {
    try {
        const resp = await fetch('/api/summary/list');
        const data = await resp.json();
        const container = document.getElementById('historyList');
        if (!data || data.length === 0) {
            container.innerHTML = '<div style="color:#333;font-size:12px;padding:12px;">Henüz kayıtlı özet yok.</div>';
            return;
        }
        container.innerHTML = data.map(s => `
            <div class="history-item" onclick="loadSummaryByDate('${s.summary_date}')">
                <span class="h-date">📅 ${formatDate(s.summary_date)}</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="h-ai">${s.ai_provider || 'claude'}</span>
                    <span class="h-time">${(s.created_at || '').split(' ')[1] || ''}</span>
                </div>
            </div>
        `).join('');
    } catch(e) {
        console.error('History load failed:', e);
    }
}

async function loadSummaryByDate(dateStr) {
    // Aktif item'ı işaretle
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');

    const box = document.getElementById('summaryBox');
    box.innerHTML = '<div class="loading-state"><div class="spinner-sm"></div><span>Yükleniyor...</span></div>';

    try {
        const resp = await fetch(`/api/summary/date/${dateStr}`);
        const data = await resp.json();
        if (data && data.content) {
            currentSummary = data.content;
            renderSummary(data.content, data.ai_provider, data.created_at);
            document.getElementById('telegramOzBtn').style.display = '';
        } else {
            box.innerHTML = '<div class="empty-state">Bu tarihe ait özet bulunamadı.</div>';
        }
    } catch(e) {
        box.innerHTML = `<div class="empty-state">❌ Hata: ${e.message}</div>`;
    }
}

async function sendSummaryToTelegram() {
    if (!currentSummary) return;
    const btn = document.getElementById('telegramOzBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Gönderiliyor...';
    try {
        const resp = await fetch('/api/summary/telegram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: currentSummary })
        });
        const data = await resp.json();
        if (data.status === 'success') {
            btn.textContent = '✅ Gönderildi!';
            btn.style.background = '#22c55e';
            setTimeout(() => {
                btn.textContent = "📨 Telegram'a Gönder";
                btn.style.background = '';
                btn.disabled = false;
            }, 3000);
        } else {
            alert('Hata: ' + data.message);
            btn.disabled = false;
            btn.textContent = "📨 Telegram'a Gönder";
        }
    } catch(e) {
        alert('Hata: ' + e.message);
        btn.disabled = false;
        btn.textContent = "📨 Telegram'a Gönder";
    }
}

async function init() {
    // Bugünün tarihini göster
    const today = new Date().toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    document.getElementById('todayBadge').textContent = today;

    // Bugünün özeti varsa yükle
    try {
        const todayStr = new Date().toISOString().split('T')[0];
        const resp = await fetch(`/api/summary/date/${todayStr}`);
        const data = await resp.json();
        if (data && data.content) {
            currentSummary = data.content;
            renderSummary(data.content, data.ai_provider, data.created_at);
            document.getElementById('telegramOzBtn').style.display = '';
        }
    } catch(e) {}

    await loadHistory();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
