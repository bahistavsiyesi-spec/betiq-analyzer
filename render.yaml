services:
  - type: web
    name: betiq-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FOOTBALL_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DB_PATH
        value: /data/betting.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
